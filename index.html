let QURAN_DATA = null;
let currentTab='all';
let currentLang=localStorage.getItem('lang')||'ru';
const i18n={ru:{timeTo:'Время до',btn:'Русский',city:'Алматы, Казахстан',back:'← Назад',title:'📖 114 Суры'},kz:{timeTo:'Уақыт қалды:',btn:'Қазақша',city:'Алматы, Қазақстан',back:'← Артқа',title:'📖 114 Сүре - Халифа Алтай'},en:{timeTo:'Time until',btn:'English',city:'Almaty',back:'← Back',title:'📖 114 Surahs'}};
const prayers_i18n={ru:{Fajr:'Фаджр',Sunrise:'Восход',Dhuhr:'Зухр',Asr:'Аср',Maghrib:'Магриб',Isha:'Иша'},kz:{Fajr:'Таң',Sunrise:'Күншығыс',Dhuhr:'Бесін',Asr:'Екінті',Maghrib:'Ақшам',Isha:'Құптан'},en:{Fajr:'Fajr',Sunrise:'Sunrise',Dhuhr:'Dhuhr',Asr:'Asr',Maghrib:'Maghrib',Isha:'Isha'}};

function showView(view){
document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
document.getElementById('view'+view.charAt(0).toUpperCase()+view.slice(1)).classList.add('active');
document.getElementById('tabTimer').classList.toggle('active',view==='timer');
document.getElementById('tabSurah').classList.toggle('active',view==='surahList'||view==='surah');
window.scrollTo(0,0);
}
document.getElementById('tabTimer').onclick=()=>showView('timer');
document.getElementById('tabSurah').onclick=()=>{showView('surahList');renderSurahList();};
document.getElementById('langBtn').onclick=function(){
const langs=['ru','kz','en'];const idx=langs.indexOf(currentLang);
currentLang=langs[(idx+1)%3];localStorage.setItem('lang',currentLang);
this.textContent=i18n[currentLang].btn;
document.getElementById('cityName').textContent=i18n[currentLang].city;
document.getElementById('surahListTitle').textContent=i18n[currentLang].title;
document.getElementById('backBtn').textContent=i18n[currentLang].back;
renderPrayerList();updateCountdown();renderSurahList();
};
function updateHijriDate(){try{const d=new Date();const h=new Intl.DateTimeFormat('ar-TN-u-ca-islamic',{day:'numeric',month:'long',year:'numeric'}).format(d);document.getElementById('hijriDate').textContent=h;}catch(e){document.getElementById('hijriDate').textContent='15 Мухаррам 1448';}}
function getNextPrayer(){const now=new Date();const order=['Fajr','Sunrise','Dhuhr','Asr','Maghrib','Isha'];for(let k of order){const [hh,mm]=PRAYER_TIMES[k].split(':');const dd=new Date();dd.setHours(+hh,+mm,0,0);if(dd>now)return{key:k,date:dd};}const [hh,mm]=PRAYER_TIMES.Fajr.split(':');const dd=new Date();dd.setDate(dd.getDate()+1);dd.setHours(+hh,+mm,0,0);return{key:'Fajr',date:dd};}
function renderPrayerList(){const t=prayers_i18n[currentLang];const order=['Fajr','Sunrise','Dhuhr','Asr','Maghrib','Isha'];const active=getNextPrayer().key;document.getElementById('prayerList').innerHTML=order.map(k=>`<div class="prayer-item ${k===active?'active':''}"><div class="prayer-name">${t[k]}</div><div class="prayer-time">${PRAYER_TIMES[k]}</div></div>`).join('');}
function updateCountdown(){const t=prayers_i18n[currentLang];const t2=i18n[currentLang];const next=getNextPrayer();const diff=next.date-new Date();const h=Math.floor(Math.abs(diff)/3600000);const m=Math.floor((Math.abs(diff)%3600000)/60000);const s=Math.floor((Math.abs(diff)%60000)/1000);document.getElementById('prayerLabel').textContent=t2.timeTo+' '+t[next.key];document.getElementById('timer').textContent=`${h<10?'0'+h:h}:${m<10?'0'+m:m}:${s<10?'0'+s:s}`;document.getElementById('nextPrayer').textContent=t[next.key]+' '+PRAYER_TIMES[next.key];}
function renderSurahList(){const lang=currentLang;document.getElementById('surahList').innerHTML=SURAHS.map(s=>{const name=lang==='kz'?s.name_kz:s.name_ru;return `<div class="surah-item" onclick="loadSurah(${s.id})"><div class="surah-num">${s.id}</div><div><div class="surah-name-ar">${s.name_ar}</div><div class="surah-name-ru">${name}</div><div class="surah-ayahs">${s.ayahs} аят</div></div></div>`;}).join('');}
async function loadQuranData(){try{let r=await fetch('./quran_full_kz.json');if(!r.ok) r=await fetch('./quran_full_kz.json');QURAN_DATA=await r.json();QURAN_DATA={...window.EMBEDDED_DATA,...QURAN_DATA};}catch(e){console.log('full json not found, using embedded');QURAN_DATA=window.EMBEDDED_DATA;}}
function loadSurah(id){
showView('surah');
const s=SURAHS.find(x=>x.id===id);
document.getElementById('surahTitleAr').textContent=s.name_ar;
document.getElementById('surahTitleRu').textContent=currentLang==='kz'?s.name_kz:s.name_ru;
const data=QURAN_DATA&&QURAN_DATA[id];
if(!data || !data.kz){
document.getElementById('ayahContainer').innerHTML=`<div style="text-align:center;padding:30px;opacity:0.8"><div class="ayah-ar">بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ</div><br>Сүре "${s.name_kz}" жүктелуде...<br><br>Қазақша аударма Халифа Алтай бойынша дайындалуда, бірақ <a href="https://quran.com/${id}/translations/103" target="_blank" style="color:#10b981">quran.com</a> арқылы толық оқи аласыз.<br><br>ID: ${id}, ${s.ayahs} аят</div>`;
return;
}
renderAyahs(data.ar||[],data.tr||[],data.ru||[],data.kz||[]);
}
function renderAyahs(ar,tr,ru,kz){
document.getElementById('ayahContainer').innerHTML=ar.map((a,i)=>`<div class="ayah"><div class="ayah-num">Аят ${i+1}</div><div class="ayah-ar ayah-part">${a}</div><div class="ayah-tr ayah-part">${tr[i]||''}</div><div class="ayah-ru ayah-part">${ru[i]||''}</div><div class="ayah-kz ayah-part">🇰🇿 ${kz[i]||'Аударма жүктелуде...'}</div></div>`).join('');
switchTab(currentTab);
}
document.querySelectorAll('.tab-btn').forEach(b=>{b.onclick=()=>{document.querySelectorAll('.tab-btn').forEach(x=>x.classList.remove('active'));b.classList.add('active');currentTab=b.dataset.tab;switchTab(currentTab);};});
