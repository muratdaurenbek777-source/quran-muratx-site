<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quran MuratX</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;600;800&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Manrope', sans-serif;
            min-height: 100vh;
            color: white;
            background: linear-gradient(135deg, #0f172a, #1e293b);
        }
     .bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.55)), #0f172a;
            z-index: -1;
        }
     .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 40px;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255,255,255,0.15);
            position: sticky;
            top: 0;
            z-index: 100;
        }
     .logo { font-size: 24px; font-weight: 800; cursor: pointer; }
     .controls { display: flex; gap: 8px; flex-wrap: wrap; }
     .btn {
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.4);
            color: white;
            padding: 8px 14px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
            font-family: inherit;
            font-size: 14px;
        }
     .btn:hover { background: rgba(255,255,255,0.3); }
     .btn.active { background: #10b981; border-color: #10b981; }
     .main { padding: 20px; }
     .container { width: 100%; max-width: 900px; margin: 0 auto; }
     .glass {
            background: rgba(0,0,0,0.4);
            padding: 30px 35px;
            border-radius: 24px;
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.25);
            margin-bottom: 20px;
        }
     .city { font-size: 18px; font-weight: 300; opacity: 0.9; margin-bottom: 8px; }
     .hijri { font-size: 14px; opacity: 0.7; margin-bottom: 16px; }
     .label { font-size: 16px; font-weight: 300; opacity: 0.8; margin-bottom: 16px; }
     .time { font-size: 72px; font-weight: 800; letter-spacing: 2px; line-height: 1; margin-bottom: 10px; text-align: center; }
     .next-prayer { font-size: 14px; opacity: 0.7; margin-bottom: 20px; text-align: center; }
     .prayer-list {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 8px;
            margin-bottom: 25px;
            padding-top: 15px;
            border-top: 1px solid rgba(255,255,255,0.15);
        }
     .prayer-item { font-size: 11px; text-align: center; }
     .prayer-name { opacity: 0.7; margin-bottom: 4px; }
     .prayer-time { font-weight: 600; }
     .prayer-item.active { color: #10b981; }
     .quran-btn {
            background: linear-gradient(135deg, #10b981, #059669);
            border: none;
            color: white;
            padding: 16px 40px;
            font-size: 18px;
            font-weight: 600;
            border-radius: 14px;
            cursor: pointer;
            transition: 0.3s;
            text-decoration: none;
            display: inline-block;
            font-family: inherit;
            margin: 6px;
        }
     .quran-btn:hover { transform: translateY(-2px); }
     .quran-btn.blue { background: linear-gradient(135deg, #3b82f6, #1d4ed8); }
     .title { font-size: 28px; font-weight: 800; margin-bottom: 20px; text-align: center; }
     .surah-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 12px;
        }
     .surah-item {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 15px;
            border-radius: 14px;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 15px;
            text-align: left;
        }
     .surah-item:hover { background: rgba(16,185,129,0.3); border-color: #10b981; }
     .surah-num {
            background: #10b981;
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            flex-shrink: 0;
        }
     .surah-name-ar { font-family: 'Amiri', serif; font-size: 20px; margin-bottom: 4px; }
     .surah-name-ru { font-size: 14px; opacity: 0.8; }
     .surah-ayahs { font-size: 12px; opacity: 0.6; }
     .surah-header { text-align: center; margin-bottom: 30px; }
     .surah-title-ar { font-family: 'Amiri', serif; font-size: 42px; margin-bottom: 8px; }
     .surah-title-ru { font-size: 20px; opacity: 0.8; margin-bottom: 8px; }
     .tabs {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }
     .tab-btn {
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.4);
            color: white;
            padding: 10px 20px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            font-family: inherit;
        }
     .tab-btn.active { background: #10b981; border-color: #10b981; }
     .ayah {
            margin-bottom: 25px;
            padding-bottom: 25px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            text-align: left;
        }
     .ayah-num {
            display: inline-block;
            background: rgba(16,185,129,0.3);
            border: 1px solid #10b981;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 12px;
        }
     .ayah-ar {
            font-family: 'Amiri', serif;
            font-size: 28px;
            line-height: 2;
            text-align: right;
            direction: rtl;
            margin-bottom: 12px;
        }
     .ayah-tr {
            font-size: 16px;
            line-height: 1.8;
            opacity: 0.9;
            margin-bottom: 12px;
            font-style: italic;
        }
     .ayah-ru {
            font-size: 16px;
            line-height: 1.8;
            opacity: 0.85;
        }
     .hidden { display: none!important; }
     .view { display: none; }
     .view.active { display: block; }
     .center { text-align: center; }

        @media (max-width: 600px) {
         .time { font-size: 48px; }
         .glass { padding: 20px 15px; }
         .header { padding: 12px 15px; }
         .prayer-list { grid-template-columns: repeat(3, 1fr); gap: 10px; }
         .surah-grid { grid-template-columns: 1fr; }
         .surah-title-ar { font-size: 32px; }
         .ayah-ar { font-size: 24px; }
        }
    </style>
</head>
<body>
    <div class="bg"></div>
    <header class="header">
        <div class="logo" onclick="showView('timer')">Quran MuratX</div>
        <div class="controls">
            <button class="btn active" id="tabTimer">⏰ Таймер</button>
            <button class="btn" id="tabSurah">📖 Суры</button>
            <button class="btn" id="langBtn">Русский</button>
        </div>
    </header>

    <main class="main">
        <div class="container">
            <!-- ТАЙМЕР -->
            <div class="view active" id="viewTimer">
                <div class="glass center">
                    <div class="city">Алматы, Казахстан</div>
                    <div class="hijri" id="hijriDate"></div>
                    <div class="label" id="prayerLabel">Время до намаза</div>
                    <div class="time" id="timer">00:00:00</div>
                    <div class="next-prayer" id="nextPrayer"></div>
                    <div class="prayer-list" id="prayerList"></div>
                    <a href="https://quran.com" target="_blank" class="quran-btn">📖 Читать Коран</a>
                    <button class="quran-btn blue" onclick="showView('surahList')">📚 Все суры</button>
                </div>
            </div>

            <!-- СПИСОК СУР -->
            <div class="view" id="viewSurahList">
                <div class="glass">
                    <h1 class="title">📖 Суры Священного Корана</h1>
                    <div class="surah-grid" id="surahList"></div>
                </div>
            </div>

            <!-- СТРАНИЦА СУРЫ -->
            <div class="view" id="viewSurah">
                <div class="glass">
                    <button class="btn" onclick="showView('surahList')" style="margin-bottom: 20px;">← Назад к списку</button>
                    <div class="surah-header">
                        <div class="surah-title-ar" id="surahTitleAr"></div>
                        <div class="surah-title-ru" id="surahTitleRu"></div>
                    </div>
                    <div class="tabs">
                        <button class="tab-btn active" data-tab="all">Все вместе</button>
                        <button class="tab-btn" data-tab="ar">Арабский</button>
                        <button class="tab-btn" data-tab="tr">Транскрипция</button>
                        <button class="tab-btn" data-tab="ru">Русский</button>
                    </div>
                    <div id="ayahContainer"></div>
                </div>
            </div>
        </div>
    </main>
