<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quran Muratx</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            background: url('https://images.unsplash.com/photo-1564769625392-651b7c5f9f5d?w=1920') center/cover no-repeat;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            color: white;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.8);
        }
        .header {
            width: 100%;
            background: rgba(0,0,0,0.6);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 { font-size: 24px; }
        .controls { display: flex; gap: 10px; }
        .btn {
            background: rgba(255,255,255,0.2);
            border: 1px solid white;
            color: white;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            backdrop-filter: blur(10px);
        }
        .center {
            text-align: center;
            background: rgba(0,0,0,0.5);
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(5px);
        }
        .time { font-size: 72px; font-weight: bold; margin: 20px 0; }
        .city { font-size: 20px; margin-bottom: 10px; }
        .quran-btn {
            background: #10b981;
            border: none;
            color: white;
            padding: 15px 40px;
            font-size: 18px;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 20px;
        }
        .quran-btn:hover { background: #059669; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Quran Muratx</h1>
        <div class="controls">
            <button class="btn">🕋 Фон 1/5</button>
            <button class="btn">Русский ▼</button>
        </div>
    </div>

    <div class="center">
        <div class="city">Алматы, Казахстан</div>
        <div class="time" id="prayerTime">00:07:11</div>
        <button class="quran-btn">📖 Читать Коран</button>
    </div>

    <div style="height: 50px;"></div>

    <script>
        // Таймер до следующего намаза - пример
        function updateTime() {
            const now = new Date();
            const next = new Date();
            next.setHours(12, 30, 0, 0);
            if (now > next) next.setDate(next.getDate() + 1);
            
            const diff = next - now;
            const h = Math.floor(diff / 3600000);
            const m = Math.floor((diff % 3600000) / 60000);
            const s = Math.floor((diff % 60000) / 1000);
            
            document.getElementById('prayerTime').textContent = 
                `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
        }
        setInterval(updateTime, 1000);
        updateTime();
    </script>
</body>
</html>
