<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quran MuratX</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-overlay: rgba(0,0,0,0.55);
            --glass-bg: rgba(0,0,0,0.4);
            --header-bg: rgba(0,0,0,0.4);
            --text-color: white;
            --border-color: rgba(255,255,255,0.25);
            --btn-bg: rgba(255,255,255,0.2);
            --btn-border: rgba(255,255,255,0.4);
        }
        body.light {
            --bg-overlay: rgba(255,255,255,0.3);
            --glass-bg: rgba(255,255,255,0.6);
            --header-bg: rgba(255,255,255,0.6);
            --text-color: #1a1a1a;
            --border-color: rgba(0,0,0,0.15);
            --btn-bg: rgba(0,0,0,0.08);
            --btn-border: rgba(0,0,0,0.2);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Manrope', sans-serif; height: 100vh; color: var(--text-color); overflow-x: hidden; transition: color 0.3s; }
        .bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, #0f172a, #1e293b); z-index: -1; transition: 0.5s ease-in-out; }
        body.light.bg { background: linear-gradient(135deg, #e0f2fe, #bae6fd); }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px 40px; background: var(--header-bg); backdrop-filter: blur(15px); border-bottom: 1px solid var(--border-color); transition: 0.3s; position: sticky; top: 0; z-index: 100; }
        .logo { font-size: 24px; font-weight: 800; }
        .controls { display: flex; gap: 8px; flex-wrap: wrap; }
        .btn { background: var(--btn-bg); border: 1px solid var(--btn-border); color: var(--text-color); padding: 8px 14px; border-radius: 12px; cursor: pointer; font-weight: 600; backdrop-filter: blur(10px); transition: 0.3s; font-family: inherit; font-size: 14px; }
        .btn:hover { opacity: 0.8; }
        .btn.active { background: #10b981; border-color: #10b981; color: white; }
        .main { text-align: center; padding: 20px; min-height: calc(100vh - 71px); display: flex; align-items: flex-start; justify-content: center; }
        .container { width: 100%; max-width: 1200px; }
        .glass { background: var(--glass-bg); padding: 30px 35px; border-radius: 24px; backdrop-filter: blur(20px); border: 1px solid var(--border-color); box-shadow: 0 8px 32px rgba(0,0,0,0.3); width: 100%; transition: 0.3s; margin-bottom: 20px; }
        .city-wrap { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
        .city { font-size: 18px; font-weight: 300; opacity: 0.9; cursor: pointer; }
        .city:hover { text-decoration: underline; }
        .hijri { font-size: 14px; opacity: 0.7; margin-bottom: 16px; }
        .label { font-size: 16px; font-weight: 300; opacity: 0.8; margin-bottom: 16px; }
        .time { font-size: 72px; font-weight: 800; letter-spacing: 2px; line-height: 1; margin-bottom: 10px; }
        .next-prayer { font-size: 14px; opacity: 0.7; margin-bottom: 20px; }
        .prayer-list { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; margin-bottom: 25px; padding-top: 15px; border-top: 1px solid var(--border-color); }
        .prayer-item { font-size: 11px; }
        .prayer-name { opacity: 0.7; margin-bottom: 4px; }
        .prayer-time { font-weight: 600; }
        .prayer-item.active { color: #10b981; }
        .prayer-item.active .prayer-time { font-weight: 800; }
        .quran-btn { background: linear-gradient(135deg, #10b981, #059669); border: none; color: white; padding: 16px 40px; font-size: 18px; font-weight: 600; border-radius: 14px; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 20px rgba(16,185,129,0.5); text-decoration: none; display: inline-block; font-family: inherit; }
        .quran-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 25px rgba(16,185,129,0.7); }
        .loading { font-size: 14px; opacity: 0.7; grid-column: span 6; }
        
        /* Qibla Compass */
        .qibla-wrap { display: none; }
        .qibla-wrap.show { display: block; }
        .compass { width: 200px; height: 200px; margin: 20px auto; position: relative; border: 3px solid var(--border-color); border-radius: 50%; background: radial-gradient(circle, var(--glass-bg), transparent); }
        .compass-arrow { position: absolute; top: 50%; left: 50%; width: 4px; height: 90px; background: linear-gradient(to top, #10b981, #059669); transform-origin: bottom center; transform: translate(-50%, -100%) rotate(0deg); transition: transform 0.3s; border-radius: 4px; }
