<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quran MuratX</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;600;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Manrope', sans-serif;
            height: 100vh;
            color: white;
            overflow-x: hidden;
            background: linear-gradient(135deg, #0f172a, #1e293b);
        }
      .bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.55)), url('./bg1.jpg') center/cover no-repeat;
            z-index: -1;
            transition: 0.5s ease-in-out;
        }
      .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 40px;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255,255,255,0.15);
            position: sticky;
            top: 0;
            z-index: 100;
        }
      .logo { font-size: 24px; font-weight: 800; }
      .controls { display: flex; gap: 8px; flex-wrap: wrap; }
      .btn {
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.4);
            color: white;
            padding: 8px 14px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            backdrop-filter: blur(10px);
            transition: 0.3s;
            font-family: inherit;
            font-size: 14px;
        }
      .btn:hover { background: rgba(255,255,255,0.3); }
      .btn.active { background: #10b981; border-color: #10b981; }
      .main {
            text-align: center;
            padding: 20px;
            min-height: calc(100vh - 71px);
            display: flex;
            align-items: flex-start;
            justify-content: center;
        }
      .container { width: 100%; max-width: 550px; }
      .glass {
            background: rgba(0,0,0,0.4);
            padding: 30px 35px;
            border-radius: 24px;
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.25);
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            width: 100%;
            transition: 0.3s;
            margin-bottom: 20px;
        }
      .city { font-size: 18px; font-weight: 300; opacity: 0.9; margin-bottom: 8px; cursor: pointer; }
      .city:hover { text-decoration: underline; }
      .hijri { font-size: 14px; opacity: 0.7; margin-bottom: 16px; }
      .label { font-size: 16px; font-weight: 300; opacity: 0.8; margin-bottom: 16px; }
      .time { font-size: 72px; font-weight: 800; letter-spacing: 2px; line-height: 1; margin-bottom: 10px; }
      .next-prayer { font-size: 14px; opacity: 0.7; margin-bottom: 20px; }
      .prayer-list {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 8px;
            margin-bottom: 25px;
            padding-top: 15px;
            border-top: 1px solid rgba(255,255,255,0.15);
        }
      .prayer-item { font-size: 11px; }
      .prayer-name { opacity: 0.7; margin-bottom: 4px; }
      .prayer-time { font-weight: 600; }
      .prayer-item.active { color: #10b981; }
      .prayer-item.active.prayer-time { font-weight: 800; }
      .quran-btn {
            background: linear-gradient(135deg, #10b981, #059669);
            border: none;
            color: white;
            padding: 16px 40px;
            font-size: 18px;
            font-weight: 600;
            border-radius: 14px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 20px rgba(16,185,129,0.5);
            text-decoration: none;
            display: inline-block;
            font-family: inherit;
        }
      .quran-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 25px rgba(16,185,129,0.7); }

        /* Qibla */
      .compass {
            width: 200px;
            height: 200px;
            margin: 20px auto;
            position: relative;
            border: 3px solid rgba(255,255,255,0.25);
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0,0,0,0.4), transparent);
        }
      .compass-arrow {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 4px;
            height: 90px;
            background: linear-gradient(to top, #10b981, #059669);
            transform-origin: bottom center;
            transform: translate(-50%, -100%) rotate(0deg);
            transition: transform 0.3s;
            border-radius: 4px;
        }
      .compass-arrow::after {
            content: '🕋';
            position: absolute;
            top: -35px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 28px;
        }
      .compass-n {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            font-weight: 800;
            font-size: 18px;
        }
      .qibla-text { opacity: 0.7; font-size: 14px; margin-bottom: 15px; }
      .qibla-distance { opacity: 0.9; font-size: 16px; font-weight: 600; margin-top: 15px; }
      .qibla-angle { font-size: 24px; font-weight: 800; color: #10b981; margin: 10px 0; }
      .city-select {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            padding: 10px 15px;
            border-radius: 12px;
            font-family: inherit;
            font-size: 14px;
            margin: 10px 0;
            width: 100%;
            max-width: 300px;
      }
      .city-select option { background: #1e293b; }

      .tab-content { display: none; }
      .tab-content.active { display: block; }

        @media (max-width: 600px) {
          .time { font-size: 48px; }
          .glass { padding: 20px 15px; }
          .header { padding: 12px 15px; }
          .prayer-list { grid-template-columns: repeat(3, 1fr); gap: 10px; }
          .prayer-item { font-size: 10px; }
          .btn { padding: 6px 10px; font-size: 12px; }
          .compass { width: 180px; height: 180px; }
        }
    </style>
</head>
<body>
    <div class="bg" id="bg"></div>
    <header class="header">
        <div class="logo">Quran MuratX</div>
        <div class="controls">
            <button class="btn active" id="tabTimer" title="Таймер">⏰</button>
            <button class="btn" id="tabQibla" title="Кибла">🧭</button>
            <button class="btn" id="bgBtn">🕋</button>
            <button class="btn" id="langBtn">Русский</button>
        </div>
    </header>
    <main class="main">
        <div class="container">
            <!-- TAB 1: TIMER -->
            <div class="tab-content active" id="contentTimer">
                <div class="glass">
                    <div class="city" id="city" title="Нажми чтобы выбрать город">Алматы, Казахстан</div>
                    <div class="hijri" id="hijriDate"></div>
                    <div class="label" id="prayerLabel">Время до намаза</div>
                    <div class="time" id="timer">00:00:00</div>
                    <div class="next-prayer" id="nextPrayer"></div>
                    <div class="prayer-list" id="prayerList"></div>
                    <a href="https://quran.com" target="_blank" class="quran-btn" id="quranBtn">📖 Читать Коран</a>
                </div>
            </div>

            <!-- TAB 2: QIBLA -->
            <div class="tab-content" id="contentQibla">
                <div class="glass">
                    <h3 style="margin-bottom: 10px;">Направление на Киблу 🕋</h3>
                    <select class="city-select" id="citySelect">
                        <option value="43.2220,76.8512">Алматы</option>
                        <option value="51.1605,71.4704">Астана</option>
                        <option value="42.3417,69.5901">Шымкент</option>
                        <option value="49.8066,73.0853">Караганда</option>
                        <option value="43.2567,76.9286">Алматинская обл.</option>
                        <option value="55.7558,37.6173">Москва</option>
                        <option value="41.2995,69.2401">Ташкент</option>
                        <option value="39.9042,116.4074">Пекин</option>
                        <option value="21.4225,39.8262">Мекка</option>
                    </select>
                    <p class="qibla-text" id="qiblaText">Выбери город или включи GPS</p>
                    <div class="qibla-angle" id="qiblaAngle"></div>
                    <div class="compass">
                        <div class="compass-n">N</div>
                        <div class="compass-arrow" id="qiblaArrow"></div>
                    </div>
                    <button class="btn" id="qiblaBtn">📍 Определить по GPS</button>
                    <div class="qibla-distance" id="qiblaDistance"></div>
                </div>
            </div>
        </div>
    </main>
