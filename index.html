<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quran Muratx</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;600;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Manrope', sans-serif; height: 100vh; color: white; overflow: hidden; }
    .bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.55)), url('./bg1.jpg') center/cover no-repeat; z-index: -1; transition: 0.5s ease-in-out; }
    .header { display: flex; justify-content: space-between; align-items: center; padding: 20px 40px; background: rgba(0,0,0,0.4); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(255,255,255,0.15); }
    .logo { font-size: 24px; font-weight: 800; }
    .controls { display: flex; gap: 12px; }
    .btn { background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.4); color: white; padding: 10px 18px; border-radius: 12px; cursor: pointer; font-weight: 600; backdrop-filter: blur(10px); transition: 0.3s; font-family: inherit; }
    .btn:hover { background: rgba(255,255,255,0.3); }
    .main { text-align: center; padding: 20px; height: calc(100vh - 81px); display: flex; align-items: center; justify-content: center; }
    .glass { background: rgba(0,0,0,0.4); padding: 40px 60px; border-radius: 24px; backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.25); box-shadow: 0 8px 32px rgba(0,0,0,0.5); }
    .city { font-size: 18px; font-weight: 300; opacity: 0.9; margin-bottom: 8px; }
    .label { font-size: 16px; font-weight: 300; opacity: 0.8; margin-bottom: 16px; }
    .time { font-size: 80px; font-weight: 800; letter-spacing: 2px; line-height: 1; margin-bottom: 10px; }
    .next-prayer { font-size: 14px; opacity: 0.7; margin-bottom: 30px; }
    .quran-btn { background: linear-gradient(135deg, #10b981, #059669); border: none; color: white; padding: 16px 40px; font-size: 18px; font-weight: 600; border-radius: 14px; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 20px rgba(16,185,129,0.5); text-decoration: none; display: inline-block; font-family: inherit; }
    .quran-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 25px rgba(16,185,129,0.7); }
        @media (max-width: 600px) {.time { font-size: 56px; }.glass { padding: 30px 20px; margin: 0 20px; }.header { padding: 15px 20px; } }
    </style>
</head>
<body>
    <div class="bg" id="bg"></div>
    <header class="header">
        <div class="logo">Quran Muratx</div>
        <div class="controls">
            <button class="btn" id="bgBtn">🕋 Фон 1/5</button>
            <button class="btn" id="langBtn">Русский</button>
        </div>
    </header>
    <main class="main">
        <div class="glass">
            <div class="city" id="city">Алматы, Казахстан</div>
            <div class="label" id="prayerLabel">Время до Аср</div>
            <div class="time" id="timer">00:00:00</div>
            <div class="next-prayer" id="nextPrayer">Аср в 15:45</div>
            <a href="https://quran.com" target="_blank" class="quran-btn" id="quranBtn">📖 Читать Коран</a>
        </div>
    </main>
    <script>
        window.onload = function() {
            try {
                var backgrounds = ['./bg1.jpg', './bg2.jpg', './bg3.jpg', './bg4.jpg', './bg5.jpg'];
                var currentBg = parseInt(localStorage.getItem('bgIndex')) || 0;
                var bgEl = document.getElementById('bg');
                var bgBtn = document.getElementById('bgBtn');
                
                function setBackground(index) {
                    bgEl.style.backgroundImage = 'linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.55)), url(' + backgrounds[index] + ')';
                    updateLang();
                }
                bgBtn.onclick = function() {
                    currentBg = (currentBg + 1) % backgrounds.length;
                    localStorage.setItem('bgIndex', currentBg);
                    setBackground(currentBg);
                };
                setBackground(currentBg);

                var langs = ['ru', 'kz', 'en'];
                var currentLang = localStorage.getItem('lang') || 'ru';
                var langBtn = document.getElementById('langBtn');
                
                var i18n = {
                    ru: { city: 'Алматы, Казахстан', timeTo: 'Время до', bg: 'Фон', quran: '📖 Читать Коран', btn: 'Русский', prayers: { fajr: 'Фаджр', dhuhr: 'Зухр', asr: 'Аср', maghrib: 'Магриб', isha: 'Иша' } },
                    kz: { city: 'Алматы, Қазақстан', timeTo: 'Уақыт қалды:', bg: 'Фон', quran: '📖 Құран оқу', btn: 'Қазақша', prayers: { fajr: 'Таң', dhuhr: 'Бесін', asr: 'Екінті', maghrib: 'Ақшам', isha: 'Құптан' } },
                    en: { city: 'Almaty, Kazakhstan', timeTo: 'Time until', bg: 'Bg', quran: '📖 Read Quran', btn: 'English', prayers: { fajr: 'Fajr', dhuhr: 'Dhuhr', asr: 'Asr', maghrib: 'Maghrib', isha: 'Isha' } }
                };

                function updateLang() {
                    var t = i18n[currentLang];
                    document.getElementById('city').textContent = t.city;
                    document.getElementById('quranBtn').textContent = t.quran;
                    langBtn.textContent = t.btn;
                    bgBtn.textContent = '🕋 ' + t.bg + ' ' + (currentBg + 1) + '/5';
                    updateCountdown();
                }

                langBtn.onclick = function() {
                    var idx = langs.indexOf(currentLang);
                    currentLang = langs[(idx + 1) % langs.length];
                    localStorage.setItem('lang', currentLang);
                    updateLang();
                };

                var prayerTimes = { fajr: '05:30', dhuhr: '12:30', asr: '15:45', maghrib: '18:15', isha: '19:45' };

                function updateCountdown() {
                    var now = new Date();
                    var t = i18n[currentLang];
                    var prayers = [
                        { key: 'fajr', time: prayerTimes.fajr },
                        { key: 'dhuhr', time: prayerTimes.dhuhr },
                        { key: 'asr', time: prayerTimes.asr },
                        { key: 'maghrib', time: prayerTimes.maghrib },
                        { key: 'isha', time: prayerTimes.isha }
                    ];
                    
                    var nextPrayer = null;
                    for (var i = 0; i < prayers.length; i++) {
                        var p = prayers[i];
                        var parts = p.time.split(':');
                        var prayerDate = new Date();
                        prayerDate.setHours(parseInt(parts[0]), parseInt(parts[1]), 0, 0);
                        if (prayerDate > now) {
                            nextPrayer = { name: t.prayers[p.key], time: p.time, date: prayerDate };
                            break;
                        }
                    }
                    if (!nextPrayer) {
                        var parts = prayers[0].time.split(':');
                        var prayerDate = new Date();
                        prayerDate.setDate(prayerDate.getDate() + 1);
                        prayerDate.setHours(parseInt(parts[0]), parseInt(parts[1]), 0, 0);
                        nextPrayer = { name: t.prayers[prayers[0].key], time: prayers[0].time, date: prayerDate };
                    }
                    
                    var diff = nextPrayer.date - now;
                    var h = Math.floor(diff / 3600000);
                    var m = Math.floor((diff % 3600000) / 60000);
                    var s = Math.floor((diff % 60000) / 1000);
                    
                    document.getElementById('prayerLabel').textContent = t.timeTo + ' ' + nextPrayer.name;
                    document.getElementById('timer').textContent = 
                        (h < 10? '0' + h : h) + ':' + 
                        (m < 10? '0' + m : m) + ':' + 
                        (s < 10? '0' + s : s);
                    document.getElementById('nextPrayer').textContent = nextPrayer.name + ' ' + nextPrayer.time;
                }
                
                setInterval(updateCountdown, 1000);
                updateLang();
            } catch (e) {
                console.error('Ошибка в скрипте:', e);
            }
        };
    </script>
</body>
</html>
