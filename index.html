<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quran Murat</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;600;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Manrope', sans-serif; height: 100vh; color: white; overflow: hidden; }
.bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.55)), url('./bg1.jpg') center/cover no-repeat; z-index: -1; transition: 0.5s ease-in-out; }
.header { display: flex; justify-content: space-between; align-items: center; padding: 20px 40px; background: rgba(0,0,0,0.4); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(255,255,255,0.15); }
.logo { font-size: 24px; font-weight: 800; }
.controls { display: flex; gap: 12px; }
.btn { background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.4); color: white; padding: 10px 18px; border-radius: 12px; cursor: pointer; font-weight: 600; backdrop-filter: blur(10px); transition: 0.3s; font-family: inherit; }
.btn:hover { background: rgba(255,255,255,0.3); }
.main { text-align: center; padding: 20px; height: calc(100vh - 81px); display: flex; align-items: center; justify-content: center; }
.glass { background: rgba(0,0,0,0.4); padding: 30px 35px; border-radius: 24px; backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.25); box-shadow: 0 8px 32px rgba(0,0,0,0.5); max-width: 550px; width: 100%; }
.city { font-size: 18px; font-weight: 300; opacity: 0.9; margin-bottom: 8px; cursor: pointer; }
.city:hover { text-decoration: underline; }
.label { font-size: 16px; font-weight: 300; opacity: 0.8; margin-bottom: 16px; }
.time { font-size: 72px; font-weight: 800; letter-spacing: 2px; line-height: 1; margin-bottom: 10px; }
.next-prayer { font-size: 14px; opacity: 0.7; margin-bottom: 20px; }
.prayer-list { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; margin-bottom: 25px; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.15); }
.prayer-item { font-size: 11px; }
.prayer-name { opacity: 0.7; margin-bottom: 4px; }
.prayer-time { font-weight: 600; }
.prayer-item.active { color: #10b981; }
.prayer-item.active.prayer-time { font-weight: 800; }
.quran-btn { background: linear-gradient(135deg, #10b981, #059669); border: none; color: white; padding: 16px 40px; font-size: 18px; font-weight: 600; border-radius: 14px; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 20px rgba(16,185,129,0.5); text-decoration: none; display: inline-block; font-family: inherit; }
.quran-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 25px rgba(16,185,129,0.7); }
.loading { font-size: 14px; opacity: 0.7; grid-column: span 6; }
        @media (max-width: 600px) {.time { font-size: 48px; }.glass { padding: 20px 15px; margin: 0 15px; }.header { padding: 15px 20px; }.prayer-list { grid-template-columns: repeat(3, 1fr); gap: 10px; }.prayer-item { font-size: 10px; } }
    </style>
</head>
<body>
    <div class="bg" id="bg"></div>
    <header class="header">
        <div class="logo">Quran Murat</div>
        <div class="controls">
            <button class="btn" id="bgBtn">🕋 Фон 1/5</button>
            <button class="btn" id="langBtn">Русский</button>
        </div>
    </header>
    <main class="main">
        <div class="glass">
            <div class="city" id="city" title="Нажми чтобы обновить">Определяем город...</div>
            <div class="label" id="prayerLabel">Время до намаза</div>
            <div class="time" id="timer">00:00:00</div>
            <div class="next-prayer" id="nextPrayer">Загрузка...</div>
            <div class="prayer-list" id="prayerList">
                <div class="loading">Загружаем время намаза...</div>
            </div>
            <a href="https://quran.com" target="_blank" class="quran-btn" id="quranBtn">📖 Читать Коран</a>
        </div>
    </main>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var backgrounds = ['./bg1.jpg', './bg2.jpg', './bg3.jpg', './bg4.jpg', './bg5.jpg'];
            var currentBg = parseInt(localStorage.getItem('bgIndex')) || 0;
            var bgEl = document.getElementById('bg');
            var bgBtn = document.getElementById('bgBtn');
            var langBtn = document.getElementById('langBtn');
            var timerEl = document.getElementById('timer');
            var cityEl = document.getElementById('city');
            var prayerListEl = document.getElementById('prayerList');

            if (!bgEl ||!bgBtn ||!langBtn ||!timerEl) return;

            function setBackground(index) {
                bgEl.style.backgroundImage = 'linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.55)), url(' + backgrounds[index] + ')';
                updateUI();
            }

            bgBtn.onclick = function() {
                currentBg = (currentBg + 1) % backgrounds.length;
                localStorage.setItem('bgIndex', currentBg);
                setBackground(currentBg);
            };

            var langs = ['ru', 'kz', 'en'];
            var currentLang = localStorage.getItem('lang') || 'ru';

            var i18n = {
                ru: { city: 'Город', timeTo: 'Время до', bg: 'Фон', quran: '📖 Читать Коран', btn: 'Русский', prayers: { Fajr: 'Фаджр', Sunrise: 'Восход', Dhuhr: 'Зухр', Asr: 'Аср', Maghrib: 'Магриб', Isha: 'Иша' }, loading: 'Загружаем время намаза...', location: 'Определяем город...', error: 'Ошибка загрузки' },
                kz: { city: 'Қала', timeTo: 'Уақыт қалды:', bg: 'Фон', quran: '📖 Құран оқу', btn: 'Қазақша', prayers: { Fajr: 'Таң', Sunrise: 'Күншығыс', Dhuhr: 'Бесін', Asr: 'Екінті', Maghrib: 'Ақшам', Isha: 'Құптан' }, loading: 'Намаз уақытын жүктеу...', location: 'Қаланы анықтау...', error: 'Жүктеу қатесі' },
                en: { city: 'City', timeTo: 'Time until', bg: 'Bg', quran: '📖 Read Quran', btn: 'English', prayers: { Fajr: 'Fajr', Sunrise: 'Sunrise', Dhuhr: 'Dhuhr', Asr: 'Asr', Maghrib: 'Maghrib', Isha: 'Isha' }, loading: 'Loading prayer times...', location: 'Detecting city...', error: 'Loading error' }
            };

            var prayerTimes = {};
            var currentCity = 'Almaty';

            function updateUI() {
                var t = i18n[currentLang];
                document.getElementById('quranBtn').textContent = t.quran;
                langBtn.textContent = t.btn;
                bgBtn.textContent = '🕋 ' + t.bg + ' ' + (currentBg + 1) + '/5';
                updateCountdown();
            }

            langBtn.onclick = function() {
                var idx = langs.indexOf(currentLang);
                currentLang = langs[(idx + 1) % langs.length];
                localStorage.setItem('lang', currentLang);
                renderPrayerList();
                updateUI();
            };

            function renderPrayerList() {
                var t = i18n[currentLang];
                if (!prayerTimes.Fajr) {
                    prayerListEl.innerHTML = '<div class="loading">' + t.loading + '</div>';
                    return;
                }
                var html = '';
                var order = ['Fajr', 'Sunrise', 'Dhuhr', 'Asr', 'Maghrib', 'Isha'];
                var activePrayer = getNextPrayer().key;
                for (var i = 0; i < order.length; i++) {
                    var key = order[i];
                    var activeClass = key === activePrayer? 'active' : '';
                    html += '<div class="prayer-item ' + activeClass + '"><div class="prayer-name">' + t.prayers[key] + '</div><div class="prayer-time">' + prayerTimes[key] + '</div></div>';
                }
                prayerListEl.innerHTML = html;
            }

            function getNextPrayer() {
                var now = new Date();
                var order = ['Fajr', 'Sunrise', 'Dhuhr', 'Asr', 'Maghrib', 'Isha'];
                for (var i = 0; i < order.length; i++) {
                    var key = order[i];
                    if (!prayerTimes[key]) continue;
                    var parts = prayerTimes[key].split(':');
                    var prayerDate = new Date();
                    prayerDate.setHours(parseInt(parts[0]), parseInt(parts[1]), 0, 0);
                    if (prayerDate > now) return { key: key, date: prayerDate };
                }
                var parts = prayerTimes.Fajr.split(':');
                var prayerDate = new Date();
                prayerDate.setDate(prayerDate.getDate() + 1);
                prayerDate.setHours(parseInt(parts[0]), parseInt(parts[1]), 0, 0);
                return { key: 'Fajr', date: prayerDate };
            }

            function updateCountdown() {
                var t = i18n[currentLang];
                if (!prayerTimes.Fajr) return;

                var next = getNextPrayer();
                var now = new Date();
                var diff = next.date - now;
                var h = Math.floor(diff / 3600000);
                var m = Math.floor((diff % 3600000) / 60000);
                var s = Math.floor((diff % 60000) / 1000);

                document.getElementById('prayerLabel').textContent = t.timeTo + ' ' + t.prayers[next.key];
                timerEl.textContent =
                    (h < 10? '0' + h : h) + ':' +
                    (m < 10? '0' + m : m) + ':' +
                    (s < 10? '0' + s : s);
                document.getElementById('nextPrayer').textContent = t.prayers[next.key] + ' ' + prayerTimes[next.key];
                renderPrayerList();
            }

            function setFallbackTimes() {
                console.log('Используем запасное время для Алматы');
                cityEl.textContent = 'Алматы, Казахстан';
                prayerTimes = { Fajr: '05:30', Sunrise: '07:00', Dhuhr: '12:30', Asr: '15:45', Maghrib: '18:15', Isha: '19:45' };
                localStorage.setItem('prayerTimes', JSON.stringify(prayerTimes));
                localStorage.setItem('city', 'Алматы');
                renderPrayerList();
                updateCountdown();
            }

            function fetchPrayerTimes(lat, lon) {
                console.log('Запрашиваем время для:', lat, lon);
                var url = 'https://api.aladhan.com/v1/timings?latitude=' + lat + '&longitude=' + lon + '&method=2';
                fetch(url).then(function(r) {
                    console.log('Ответ API:', r.status);
                    return r.json();
                }).then(function(data) {
                    console.log('Данные:', data);
                    if (data.code === 200) {
                        var times = data.data.timings;
                        prayerTimes = {
                            Fajr: times.Fajr,
                            Sunrise: times.Sunrise,
                            Dhuhr: times.Dhuhr,
                            Asr: times.Asr,
                            Maghrib: times.Maghrib,
                            Isha: times.Isha
                        };
                        currentCity = data.data.meta.timezone.split('/')[1].replace('_', ' ');
                        cityEl.textContent = currentCity;
                        localStorage.setItem('prayerTimes', JSON.stringify(prayerTimes));
                        localStorage.setItem('city', currentCity);
                        renderPrayerList();
                        updateCountdown();
                    } else {
                        setFallbackTimes();
                    }
                }).catch(function(e) {
                    console.error('Ошибка API:', e);
                    setFallbackTimes();
                });
            }

            function getLocation() {
                var t = i18n[currentLang];
                cityEl.textContent = t.location;
                if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition(function(pos) {
                        fetchPrayerTimes(pos.coords.latitude, pos.coords.longitude);
                    }, function(err) {
                        console.log('Геолокация отклонена:', err);
                        fetchPrayerTimes(43.2220, 76.8512); // Алматы по умолчанию
                    });
                } else {
                    fetchPrayerTimes(43.2220, 76.8512);
                }
            }

            cityEl.onclick = getLocation;

            var cachedTimes = localStorage.getItem('prayerTimes');
            var cachedCity = localStorage.getItem('city');
            if (cachedTimes) {
                prayerTimes = JSON.parse(cachedTimes);
                cityEl.textContent = cachedCity || 'Алматы';
                renderPrayerList();
                updateCountdown();
            }

            setInterval(updateCountdown, 1000);
            setBackground(currentBg);
            updateUI();
            getLocation();
        });
    </script>
</body>
</html>
