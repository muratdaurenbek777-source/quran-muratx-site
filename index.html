const REAL_KZ = {1: ['Аса қамқор, ерекше мейірімді Алланың атымен!', 'Барлық мақтау әлемдердің Раббысы Аллаға тән,', 'Аса қамқор, ерекше мейірімді,', 'Қиямет күнінің Иесі!', 'Саған ғана құлшылық етеміз, Сенен ғана жәрдем тілейміз!', 'Бізді тура жолға сала гөр!', 'Өзің нығметке бөлегендердің жолына, қаһарыңа ұшырағандар мен адасқандардың жолына емес!'], 112: ['Айт: Ол Алла жалғыз!', 'Алла мұңсыз (ешкімге мұқтаж емес).', 'Ол тумаған және туылмаған,', 'Оған тең келетін ешкім жоқ!'], 113: ['Айт: Таңның Раббысына пана тілеймін,', 'Жаратқан нәрселерінің кесірінен,', 'Қараңғылық түскендегі түннің кесірінен,', 'Түйіндерге дем салушылардың кесірінен,', 'Көре алмағанда көреалмаушының кесірінен!'], 114: ['Айт: Адамдардың Раббысына пана тілеймін,', 'Адамдардың Патшасына,', 'Адамдардың Құдайына,', 'Жасырын азғырушының кесірінен,', 'Ол адамдардың кеуделеріне азғыру салады,', 'Жындардан да, адамдардан да!'], 103: ['Ғасырға серт!', 'Расында адам баласы зиянда,', 'Иман келтіріп, ізгі амал істеген, бір-біріне ақиқатты және сабырды насихаттағандардан басқа!'], 108: ['Расында Біз саған Кәусарды бердік.', 'Раббың үшін намаз оқы және құрбан шал.', 'Сені жек көрушінің өзі құрдымға кетеді!']};

function showView(view){
document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
document.getElementById('view'+view.charAt(0).toUpperCase()+view.slice(1)).classList.add('active');
document.getElementById('tabTimer').classList.toggle('active',view==='timer');
document.getElementById('tabSurah').classList.toggle('active',view.includes('surah'));
window.scrollTo(0,0);
if(view==='surahList') renderSurahList();
}
document.getElementById('tabTimer').onclick=()=>showView('timer');
document.getElementById('tabSurah').onclick=()=>showView('surahList');
document.getElementById('langBtn').onclick=function(){
const langs=['ru','kz','en'];let idx=langs.indexOf(currentLang);currentLang=langs[(idx+1)%3];localStorage.setItem('lang',currentLang);this.textContent=i18n[currentLang].btn;renderPrayerList();updateCountdown();renderSurahList();
};

function getNextPrayer(){
const now=new Date();const order=['Fajr','Sunrise','Dhuhr','Asr','Maghrib','Isha'];
for(let k of order){const [h,m]=PRAYER_TIMES[k].split(':');const d=new Date();d.setHours(+h,+m,0,0);if(d>now) return {key:k,date:d};}
const [h,m]=PRAYER_TIMES.Fajr.split(':');const d=new Date();d.setDate(d.getDate()+1);d.setHours(+h,+m,0,0);return {key:'Fajr',date:d};
}
function renderPrayerList(){
const t=prayers_i18n[currentLang]||prayers_i18n.ru;const order=['Fajr','Sunrise','Dhuhr','Asr','Maghrib','Isha'];const active=getNextPrayer().key;
document.getElementById('prayerList').innerHTML=order.map(k=>`<div class="prayer-item ${k===active?'active':''}"><div style="opacity:0.6">${t[k]}</div><div style="font-weight:600">${PRAYER_TIMES[k]}</div></div>`).join('');
}
function updateCountdown(){
const t=prayers_i18n[currentLang]||prayers_i18n.ru;const t2=i18n[currentLang]||i18n.ru;const next=getNextPrayer();const diff=next.date-new Date();
const h=Math.floor(Math.abs(diff)/3600000);const m=Math.floor((Math.abs(diff)%3600000)/60000);const s=Math.floor((Math.abs(diff)%60000)/1000);
document.getElementById('prayerLabel').textContent=t2.timeTo+' '+t[next.key];
document.getElementById('timer').textContent=`${h<10?'0'+h:h}:${m<10?'0'+m:m}:${s<10?'0'+s:s}`;
document.getElementById('nextPrayer').textContent=t[next.key]+' '+PRAYER_TIMES[next.key];
}

function renderSurahList(){
const lang=currentLang;
document.getElementById('surahList').innerHTML=SURAHS.map(s=>{
const name=lang==='kz'?s.name_kz:(lang==='ru'?s.name_ru:s.name_kz);
return `<div class="surah-item" onclick="loadSurah(${s.id})"><div class="surah-num">${s.id}</div><div><div class="surah-name-ar">${s.name_ar}</div><div class="surah-name-ru">${name} • ${s.ayahs} аят</div></div></div>`;
}).join('');
}

function loadSurah(id){
showView('surah');
const s=SURAHS.find(x=>x.id===id);
document.getElementById('surahTitleAr').textContent=s.name_ar;
document.getElementById('surahTitleRu').textContent=(currentLang==='kz'?s.name_kz:s.name_ru)+' • '+s.ayahs+' аят';
let ar=[],kz=[],ru=[];
if(REAL_KZ[id]){
  const real=REAL_KZ[id];
  const count=s.ayahs;
  // Create arabic placeholder if needed
  ar = Array(count).fill(0).map((_,i)=>`﴿ آية ${i+1} ﴾ - ${s.name_ar}`);
  // If real has less than count, fill rest
  kz = [...real];
  while(kz.length<count) kz.push(`${kz.length+1}-аят. (Халифа Алтай аудармасы толық нұсқасы quran.com сайтында)`);
  ru = Array(count).fill(0).map((_,i)=>`Аят ${i+1} - перевод Кулиева`);
} else {
  ar = Array(s.ayahs).fill(0).map((_,i)=>`﴿ ${s.name_ar} - аят ${i+1} ﴾`);
  kz = Array(s.ayahs).fill(0).map((_,i)=>`${i+1}-аят. ${s.name_kz} сүресі, Халифа Алтай аудармасы. Толық мәтін: quran.com/${id}`);
  ru = Array(s.ayahs).fill(0).map((_,i)=>`${i+1} аят. Сура ${s.name_ru}`);
}
document.getElementById('ayahContainer').innerHTML=ar.map((a,i)=>`<div class="ayah"><div class="ayah-num">Аят ${i+1}</div><div class="ayah-ar ayah-part">${a}</div><div class="ayah-kz ayah-part">🇰🇿 ${kz[i]}</div><div class="ayah-ru ayah-part">${ru[i]}</div></div>`).join('');
switchTab(currentTab);
}

document.querySelectorAll('.tab-btn').forEach(b=>{
b.onclick=()=>{document.querySelectorAll('.tab-btn').forEach(x=>x.classList.remove('active'));b.classList.add('active');currentTab=b.dataset.tab;switchTab(currentTab);};
});
function switchTab(tab){
document.querySelectorAll('.ayah-part').forEach(e=>e.classList.add('hidden'));
if(tab==='all') document.querySelectorAll('.ayah-part').forEach(e=>e.classList.remove('hidden'));
else if(tab==='ar') document.querySelectorAll('.ayah-ar').forEach(e=>e.classList.remove('hidden'));
else if(tab==='kz') document.querySelectorAll('.ayah-kz').forEach(e=>e.classList.remove('hidden'));
else if(tab==='ru') document.querySelectorAll('.ayah-ru').forEach(e=>e.classList.remove('hidden'));
}

document.getElementById('langBtn').textContent=i18n[currentLang].btn;
try{const d=new Date();const h=new Intl.DateTimeFormat('ar-TN-u-ca-islamic',{day:'numeric',month:'long',year:'numeric'}).format(d);document.getElementById('hijriDate').textContent=h;}catch(e){}
updateCountdown();setInterval(updateCountdown,1000);renderPrayerList();renderSurahList();
</script>
</body>
</html>
