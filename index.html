<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quran MuratX</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;600;800&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Manrope', sans-serif;
            min-height: 100vh;
            color: #fff;
            background: #0f172a;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: rgba(0,0,0,0.6);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .logo { font-size: 24px; font-weight: 800; cursor: pointer; }
        .controls { display: flex; gap: 8px; }
        .btn {
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            padding: 8px 14px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
        }
        .btn.active { background: #10b981; border-color: #10b981; }
        .main { padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        .glass {
            background: rgba(0,0,0,0.5);
            padding: 30px 25px;
            border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.2);
            margin-bottom: 20px;
        }
        .center { text-align: center; }
        .city { font-size: 18px; opacity: 0.9; margin-bottom: 8px; }
        .hijri { font-size: 14px; opacity: 0.7; margin-bottom: 16px; }
        .label { font-size: 16px; opacity: 0.8; margin-bottom: 16px; }
        .time { font-size: 64px; font-weight: 800; margin-bottom: 10px; }
        .next-prayer { font-size: 14px; opacity: 0.7; margin-bottom: 20px; }
        .prayer-list {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 25px;
            padding-top: 15px;
            border-top: 1px solid rgba(255,255,255,0.15);
        }
        .prayer-item { font-size: 11px; text-align: center; }
        .prayer-name { opacity: 0.7; margin-bottom: 4px; }
        .prayer-time { font-weight: 600; }
        .prayer-item.active { color: #10b981; }
        .quran-btn {
            background: #10b981;
            border: none;
            color: white;
            padding: 16px 40px;
            font-size: 18px;
            font-weight: 600;
            border-radius: 14px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            margin: 6px;
        }
        .quran-btn.blue { background: #3b82f6; }
        .title { font-size: 28px; font-weight: 800; margin-bottom: 20px; text-align: center; }
        .surah-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 12px;
        }
        .surah-item {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 15px;
            border-radius: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .surah-item:hover { background: rgba(16,185,129,0.3); }
        .surah-num {
            background: #10b981;
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            flex-shrink: 0;
        }
        .surah-name-ar { font-family: 'Amiri', serif; font-size: 20px; margin-bottom: 4px; }
        .surah-name-ru { font-size: 14px; opacity: 0.8; }
        .surah-ayahs { font-size: 12px; opacity: 0.6; }
        .surah-header { text-align: center; margin-bottom: 30px; }
        .surah-title-ar { font-family: 'Amiri', serif; font-size: 42px; margin-bottom: 8px; }
        .surah-title-ru { font-size: 20px; opacity: 0.8; }
        .tabs {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }
        .tab-btn {
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            padding: 10px 20px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
        }
        .tab-btn.active { background: #10b981; }
        .ayah {
            margin-bottom: 25px;
            padding-bottom: 25px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .ayah-num {
            display: inline-block;
            background: rgba(16,185,129,0.3);
            border: 1px solid #10b981;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            margin-bottom: 12px;
        }
        .ayah-ar {
            font-family: 'Amiri', serif;
            font-size: 28px;
            line-height: 2;
            text-align: right;
            direction: rtl;
            margin-bottom: 12px;
        }
        .ayah-tr {
            font-size: 16px;
            line-height: 1.8;
            opacity: 0.9;
            margin-bottom: 12px;
            font-style: italic;
        }
        .ayah-ru {
            font-size: 16px;
            line-height: 1.8;
            opacity: 0.85;
        }
