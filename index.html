<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quran MuratX</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;600;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Manrope', sans-serif;
            height: 100vh;
            color: white;
            overflow-x: hidden;
            background: linear-gradient(135deg, #0f172a, #1e293b);
        }
      .bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.55)), url('./bg1.jpg') center/cover no-repeat;
            z-index: -1;
            transition: 0.5s ease-in-out;
        }
      .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 40px;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255,255,255,0.15);
            position: sticky;
            top: 0;
            z-index: 100;
        }
      .logo { font-size: 24px; font-weight: 800; }
      .controls { display: flex; gap: 8px; flex-wrap: wrap; }
      .btn {
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.4);
            color: white;
            padding: 8px 14px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            backdrop-filter: blur(10px);
            transition: 0.3s;
            font-family: inherit;
            font-size: 14px;
        }
      .btn:hover { background: rgba(255,255,255,0.3); }
      .btn.active { background: #10b981; border-color: #10b981; }
      .main {
            text-align: center;
            padding: 20px;
            min-height: calc(100vh - 71px);
            display: flex;
            align-items: flex-start;
            justify-content: center;
        }
      .container { width: 100%; max-width: 550px; }
      .glass {
            background: rgba(0,0,0,0.4);
            padding: 30px 35px;
            border-radius: 24px;
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.25);
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            width: 100%;
            transition: 0.3s;
            margin-bottom: 20px;
        }
      .city { font-size: 18px; font-weight: 300; opacity: 0.9; margin-bottom: 8px; }
      .hijri { font-size: 14px; opacity: 0.7; margin-bottom: 16px; }
      .label { font-size: 16px; font-weight: 300; opacity: 0.8; margin-bottom: 16px; }
      .time { font-size: 72px; font-weight: 800; letter-spacing: 2px; line-height: 1; margin-bottom: 10px; }
      .next-prayer { font-size: 14px; opacity: 0.7; margin-bottom: 20px; }
      .prayer-list {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 8px;
            margin-bottom: 25px;
            padding-top: 15px;
            border-top: 1px solid rgba(255,255,255,0.15);
        }
      .prayer-item { font-size: 11px; }
      .prayer-name { opacity: 0.7; margin-bottom: 4px; }
      .prayer-time { font-weight: 600; }
      .prayer-item.active { color: #10b981; }
      .prayer-item.active.prayer-time { font-weight: 800; }
      .quran-btn {
            background: linear-gradient(135deg, #10b981, #059669);
            border: none;
            color: white;
            padding: 16px 40px;
            font-size: 18px;
            font-weight: 600;
            border-radius: 14px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 20px rgba(16,185,129,0.5);
            text-decoration: none;
            display: inline-block;
            font-family: inherit;
        }
      .quran-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 25px rgba(16,185,129,0.7); }

        /* Qibla Compass */
      .compass {
            width: 200px;
            height: 200px;
            margin: 20px auto;
            position: relative;
            border: 3px solid rgba(255,255,255,0.25);
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0,0,0,0.4), transparent);
        }
      .compass-arrow {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 4px;
            height: 90px;
            background: linear-gradient(to top, #10b981, #059669);
            transform-origin: bottom center;
            transform: translate(-50%, -100%) rotate(0deg);
            transition: transform 0.3s;
            border-radius: 4px;
        }
      .compass-arrow::after {
            content: '🕋';
            position: absolute;
            top: -35px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 28px;
        }
      .compass-n {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            font-weight: 800;
            font-size: 18px;
        }
      .qibla-text { opacity: 0.7; font-size: 14px; margin-bottom: 15px; }
      .qibla-distance { opacity: 0.9; font-size: 16px; font-weight: 600; margin-top: 15px; }

      .tab-content { display: none; }
      .tab-content.active { display: block; }

        @media (max-width: 600px) {
          .time { font-size: 48px; }
          .glass { padding: 20px 15px; }
          .header { padding: 12px 15px; }
          .prayer-list { grid-template-columns: repeat(3, 1fr); gap: 10px; }
          .prayer-item { font-size: 10px; }
          .btn { padding: 6px 10px; font-size: 12px; }
          .compass { width: 180px; height: 180px; }
        }
    </style>
</head>
<body>
    <div class="bg" id="bg"></div>
    <header class="header">
        <div class="logo">Quran MuratX</div>
        <div class="controls">
            <button class="btn active" id="tabTimer" title="Таймер">⏰</button>
            <button class="btn" id="tabQibla" title="Кибла">🧭</button>
            <button class="btn" id="bgBtn">🕋</button>
            <button class="btn" id="langBtn">Русский</button>
        </div>
    </header>
    <main class="main">
        <div class="container">
            <!-- TAB 1: TIMER -->
            <div class="tab-content active" id="contentTimer">
                <div class="glass">
                    <div class="city" id="city">Алматы, Казахстан</div>
                    <div class="hijri" id="hijriDate"></div>
                    <div class="label" id="prayerLabel">Время до намаза</div>
                    <div class="time" id="timer">00:00:00</div>
                    <div class="next-prayer" id="nextPrayer"></div>
                    <div class="prayer-list" id="prayerList"></div>
                    <a href="https://quran.com" target="_blank" class="quran-btn" id="quranBtn">📖 Читать Коран</a>
                </div>
            </div>

            <!-- TAB 2: QIBLA -->
            <div class="tab-content" id="contentQibla">
                <div class="glass">
                    <h3 style="margin-bottom: 10px;">Направление на Киблу 🕋</h3>
                    <p class="qibla-text" id="qiblaText">Нажми кнопку чтобы включить компас</p>
                    <div class="compass">
                        <div class="compass-n">N</div>
                        <div class="compass-arrow" id="qiblaArrow"></div>
                    </div>
                    <button class="btn" id="qiblaBtn">🧭 Включить компас</button>
                    <div class="qibla-distance" id="qiblaDistance"></div>
                </div>
            </div>
        </div>
    </main>
    <script>
        // ВРЕМЯ НАМАЗА ДЛЯ АЛМАТЫ - ИЮЛЬ 2026
        var PRAYER_TIMES = {
            Fajr: '03:45', Sunrise: '05:25', Dhuhr: '13:15',
            Asr: '17:25', Maghrib: '20:50', Isha: '22:30'
        };

        // Координаты Мекки для Киблы
        var MAKKAH = { lat: 21.4225, lon: 39.8262 };
        var userLocation = { lat: 43.2220, lon: 76.8512 }; // Алматы по умолчанию

        var backgrounds = ['./bg1.jpg', './bg2.jpg', './bg3.jpg', './bg4.jpg', './bg5.jpg'];
        var currentBg = parseInt(localStorage.getItem('bgIndex')) || 0;
        var currentTab = 'timer';

        var bgEl = document.getElementById('bg');
        var bgBtn = document.getElementById('bgBtn');
        var langBtn = document.getElementById('langBtn');
        var timerEl = document.getElementById('timer');
        var prayerListEl = document.getElementById('prayerList');
        var hijriEl = document.getElementById('hijriDate');
        var qiblaArrow = document.getElementById('qiblaArrow');
        var qiblaBtn = document.getElementById('qiblaBtn');
        var qiblaText = document.getElementById('qiblaText');
        var qiblaDistance = document.getElementById('qiblaDistance');

        // TABS
        document.getElementById('tabTimer').onclick = () => switchTab('timer');
        document.getElementById('tabQibla').onclick = () => switchTab('qibla');

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.controls.btn').forEach(b => b.classList.remove('active'));
            document.getElementById('content' + tab.charAt(0).toUpperCase() + tab.slice(1)).classList.add('active');
            document.getElementById('tab' + tab.charAt(0).toUpperCase() + tab.slice(1)).classList.add('active');
        }

        function setBackground(index) {
            bgEl.style.backgroundImage = 'linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.55)), url(' + backgrounds[index] + ')';
        }
        setBackground(currentBg);

        bgBtn.onclick = function() {
            currentBg = (currentBg + 1) % backgrounds.length;
            localStorage.setItem('bgIndex', currentBg);
            setBackground(currentBg);
            bgBtn.textContent = '🕋 ' + (currentBg + 1) + '/5';
        };

        var langs = ['ru', 'kz', 'en'];
        var currentLang = localStorage.getItem('lang') || 'ru';

        var i18n = {
            ru: { timeTo: 'Время до', quran: '📖 Читать Коран', btn: 'Русский', prayers: { Fajr: 'Фаджр', Sunrise: 'Восход', Dhuhr: 'Зухр', Asr: 'Аср', Maghrib: 'Магриб', Isha: 'Иша' }, qibla: 'Нажми кнопку чтобы включить компас', qiblaActive: 'Поворачивай телефон. Стрелка указывает на Киблу' },
            kz: { timeTo: 'Уақыт қалды:', quran: '📖 Құран оқу', btn: 'Қазақша', prayers: { Fajr: 'Таң', Sunrise: 'Күншығыс', Dhuhr: 'Бесін', Asr: 'Екінті', Maghrib: 'Ақшам', Isha: 'Құптан' }, qibla: 'Компасты қосу үшін батырманы бас', qiblaActive: 'Телефонды бұра. Жебе Қыбыланы көрсетеді' },
            en: { timeTo: 'Time until', quran: '📖 Read Quran', btn: 'English', prayers: { Fajr: 'Fajr', Sunrise: 'Sunrise', Dhuhr: 'Dhuhr', Asr: 'Asr', Maghrib: 'Maghrib', Isha: 'Isha' }, qibla: 'Press button to enable compass', qiblaActive: 'Rotate phone. Arrow points to Qibla' }
        };

        function updateUI() {
            var t = i18n[currentLang];
            document.getElementById('quranBtn').textContent = t.quran;
            langBtn.textContent = t.btn;
            bgBtn.textContent = '🕋 ' + (currentBg + 1) + '/5';
            qiblaText.textContent = t.qibla;
            updateHijriDate();
            updateCountdown();
        }

        langBtn.onclick = function() {
            var idx = langs.indexOf(currentLang);
            currentLang = langs[(idx + 1) % langs.length];
            localStorage.setItem('lang', currentLang);
            renderPrayerList();
            updateUI();
        };

        function updateHijriDate() {
            try {
                var date = new Date();
                var hijri = new Intl.DateTimeFormat('ar-TN-u-ca-islamic', { day: 'numeric', month: 'long', year: 'numeric' }).format(date);
                hijriEl.textContent = hijri;
            } catch(e) {
                hijriEl.textContent = '15 Мухаррам 1448';
            }
        }

        function renderPrayerList() {
            var t = i18n[currentLang];
            var html = '';
            var order = ['Fajr', 'Sunrise', 'Dhuhr', 'Asr', 'Maghrib', 'Isha'];
            var activePrayer = getNextPrayer().key;
            for (var i = 0; i < order.length; i++) {
                var key = order[i];
                var activeClass = key === activePrayer? 'active' : '';
                html += '<div class="prayer-item ' + activeClass + '"><div class="prayer-name">' + t.prayers[key] + '</div><div class="prayer-time">' + PRAYER_TIMES[key] + '</div></div>';
            }
            prayerListEl.innerHTML = html;
        }

        function getNextPrayer() {
            var now = new Date();
            var order = ['Fajr', 'Sunrise', 'Dhuhr', 'Asr', 'Maghrib', 'Isha'];
            for (var i = 0; i < order.length; i++) {
                var key = order[i];
                var parts = PRAYER_TIMES[key].split(':');
                var prayerDate = new Date();
                prayerDate.setHours(parseInt(parts[0]), parseInt(parts[1]), 0, 0);
                if (prayerDate > now) return { key: key, date: prayerDate };
            }
            var parts = PRAYER_TIMES.Fajr.split(':');
            var prayerDate = new Date();
            prayerDate.setDate(prayerDate.getDate() + 1);
            prayerDate.setHours(parseInt(parts[0]), parseInt(parts[1]), 0, 0);
            return { key: 'Fajr', date: prayerDate };
        }

        function updateCountdown() {
            var t = i18n[currentLang];
            var next = getNextPrayer();
            var now = new Date();
            var diff = next.date - now;
            var h = Math.floor(Math.abs(diff) / 3600000);
            var m = Math.floor((Math.abs(diff) % 3600000) / 60000);
            var s = Math.floor((Math.abs(diff) % 60000) / 1000);

            document.getElementById('prayerLabel').textContent = t.timeTo + ' ' + t.prayers[next.key];
            timerEl.textContent = (h < 10? '0' + h : h) + ':' + (m < 10? '0' + m : m) + ':' + (s < 10? '0' + s : s);
            document.getElementById('nextPrayer').textContent = t.prayers[next.key] + ' ' + PRAYER_TIMES[next.key];
            renderPrayerList();
        }

        // QIBLA COMPASS
        function calculateQibla(lat, lon) {
            var phi1 = lat * Math.PI / 180;
            var phi2 = MAKKAH.lat * Math.PI / 180;
            var delta = (MAKKAH.lon - lon) * Math.PI / 180;
            var y = Math.sin(delta);
            var x = Math.cos(phi1) * Math.tan(phi2) - Math.sin(phi1) * Math.cos(delta);
            var qibla = Math.atan2(y, x) * 180 / Math.PI;
            return (qibla + 360) % 360;
        }

        function calculateDistance(lat1, lon1, lat2, lon2) {
            var R = 6371; // km
            var dLat = (lat2 - lat1) * Math.PI / 180;
            var dLon = (lon2 - lon1) * Math.PI / 180;
            var a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            var c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return Math.round(R * c);
        }

        qiblaBtn.onclick = function() {
            var t = i18n[currentLang];
            if (window.DeviceOrientationEvent) {
                if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                    DeviceOrientationEvent.requestPermission().then(perm => {
                        if (perm === 'granted') startQibla();
                    });
                } else {
                    startQibla();
                }
            } else {
                qiblaText.textContent = 'Компас не поддерживается на этом устройстве';
            }
        };

        function startQibla() {
            var t = i18n[currentLang];
            qiblaText.textContent = t.qiblaActive;
            qiblaBtn.style.display = 'none';

            navigator.geolocation.getCurrentPosition(pos => {
                userLocation = { lat: pos.coords.latitude, lon: pos.coords.longitude };
                var qiblaAngle = calculateQibla(userLocation.lat, userLocation.lon);
                var distance = calculateDistance(userLocation.lat, userLocation.lon, MAKKAH.lat, MAKKAH.lon);
                qiblaDistance.textContent = distance + ' км до Мекки';

                window.addEventListener('deviceorientation', e => {
                    var heading = e.webkitCompassHeading || Math.abs(e.alpha - 360);
                    var rotation = qiblaAngle - heading;
                    qiblaArrow.style.transform = `translate(-50%, -100%) rotate(${rotation}deg)`;
                });
            }, () => {
                qiblaText.textContent = 'Разреши доступ к геолокации';
            });
        }

        renderPrayerList();
        setInterval(updateCountdown, 1000);
        updateUI();
    </script>
</body>
</html>
