<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quran MuratX - Время намаза Алматы</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;600;800&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Manrope',sans-serif;min-height:100vh;color:white;overflow-x:hidden;position:relative;background:#000}
.bg-slider{position:fixed;top:0;left:0;width:100%;height:100%;z-index:-2;overflow:hidden}
.bg-slide{position:absolute;top:0;left:0;width:100%;height:100%;background-size:cover;background-position:center;opacity:0;transition:opacity 1.5s ease-in-out;filter:brightness(0.7)}
.bg-slide.active{opacity:1}
.overlay{position:fixed;top:0;left:0;width:100%;height:100%;z-index:-1;background:linear-gradient(135deg,rgba(0,0,0,0.55) 0%,rgba(15,23,42,0.4) 50%,rgba(6,78,59,0.45) 100%)}
.header{display:flex;justify-content:space-between;align-items:center;padding:14px 30px;background:rgba(0,0,0,0.35);backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,0.15);position:sticky;top:0;z-index:100}
.logo{font-size:22px;font-weight:800;letter-spacing:0.5px}
.controls{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.btn{background:rgba(255,255,255,0.18);border:1px solid rgba(255,255,255,0.28);color:white;padding:8px 14px;border-radius:10px;cursor:pointer;font-weight:600;font-size:13px;font-family:inherit;backdrop-filter:blur(8px)}
.btn:hover{background:rgba(255,255,255,0.28)}
.btn.active{background:#10b981;border-color:#10b981}
.dots{display:flex;gap:6px;align-items:center;margin-left:10px}
.dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,0.4);cursor:pointer;transition:all 0.3s}
.dot.active{background:#10b981;width:20px;border-radius:4px}
.main{display:flex;align-items:center;justify-content:center;min-height:calc(100vh - 65px);padding:20px}
.container{width:100%;max-width:720px}
.glass{background:rgba(0,0,0,0.48);padding:38px 32px;border-radius:26px;backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.22);box-shadow:0 10px 40px rgba(0,0,0,0.5);text-align:center}
.city{font-size:20px;font-weight:300;opacity:0.95;margin-bottom:6px}
.hijri{font-size:14px;opacity:0.7;margin-bottom:16px;font-family:'Amiri',serif}
.label{font-size:15px;opacity:0.85;margin-bottom:14px}
.time{font-size:72px;font-weight:800;letter-spacing:3px;line-height:1;margin-bottom:10px;text-shadow:0 3px 20px rgba(0,0,0,0.6)}
.next-prayer{font-size:14px;opacity:0.75;margin-bottom:22px}
.prayer-list{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin-bottom:26px;padding-top:16px;border-top:1px solid rgba(255,255,255,0.15)}
.prayer-item{background:rgba(255,255,255,0.08);padding:10px 4px;border-radius:10px;font-size:11px;border:1px solid rgba(255,255,255,0.08)}
.prayer-name{opacity:0.7;margin-bottom:3px;font-size:10px}.prayer-time{font-weight:700;font-size:12px}
.prayer-item.active{background:rgba(16,185,129,0.32);border-color:#10b981;color:#a7f3d0}
.buttons{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.quran-btn{background:linear-gradient(135deg,#10b981,#059669);border:none;color:white;padding:14px 32px;font-size:16px;font-weight:600;border-radius:12px;cursor:pointer;text-decoration:none;display:inline-block;font-family:inherit;box-shadow:0 4px 18px rgba(16,185,129,0.4);transition:transform 0.2s}
.quran-btn:hover{transform:translateY(-2px)}
.quran-btn.blue{background:linear-gradient(135deg,#3b82f6,#1d4ed8);box-shadow:0 4px 18px rgba(59,130,246,0.35)}
.footer{margin-top:22px;font-size:11px;opacity:0.5}
@media(max-width:700px){.header{padding:10px 14px}.time{font-size:52px}.glass{padding:22px 16px}.prayer-list{grid-template-columns:repeat(3,1fr)}.buttons{flex-direction:column}.quran-btn{width:100%}}
</style>
</head>
<body>
<div class="bg-slider" id="bgSlider">
<div class="bg-slide active" style="background-image:url('./bg1.jpg')"></div>
<div class="bg-slide" style="background-image:url('./bg2.jpg')"></div>
<div class="bg-slide" style="background-image:url('./bg3.jpg')"></div>
<div class="bg-slide" style="background-image:url('./bg4.jpg')"></div>
<div class="bg-slide" style="background-image:url('./bg5.jpg')"></div>
</div>
<div class="overlay"></div>
<header class="header">
<div class="logo">Quran MuratX</div>
<div class="controls">
<button class="btn" id="langBtn">Русский</button>
<button class="btn" id="prevBtn">‹</button>
<button class="btn" id="nextBtn">›</button>
<div class="dots" id="dots"></div>
</div>
</header>
<main class="main">
<div class="container">
<div class="glass">
<div class="city" id="cityName">Алматы, Казахстан</div>
<div class="hijri" id="hijriDate"></div>
<div class="label" id="prayerLabel">Время до намаза</div>
<div class="time" id="timer">00:00:00</div>
<div class="next-prayer" id="nextPrayer">Загрузка...</div>
<div class="prayer-list" id="prayerList"></div>
<div class="buttons">
<a href="https://quran.com" target="_blank" class="quran-btn">📖 Читать Коран</a>
<a href="https://quran.com/kk" target="_blank" class="quran-btn blue">🇰🇿 Қазақша - Халифа Алтай</a>
</div>
<div class="footer">Quran MuratX • 5 фонов Каабы • Авто смена каждые 8 сек • Алматы • Халифа Алтай</div>
</div>
</div>
</main>
<script>
const PRAYER_TIMES = {Fajr:'03:45',Sunrise:'05:25',Dhuhr:'13:15',Asr:'17:25',Maghrib:'20:50',Isha:'22:30'};
let currentLang = localStorage.getItem('lang')||'ru';
let currentSlide = parseInt(localStorage.getItem('kaabaSlide')||'0');
const i18n = {
ru:{timeTo:'Время до',city:'Алматы, Казахстан',btn:'Русский',prayers:{Fajr:'Фаджр',Sunrise:'Восход',Dhuhr:'Зухр',Asr:'Аср',Maghrib:'Магриб',Isha:'Иша'}},
kz:{timeTo:'Уақыт қалды:',city:'Алматы, Қазақстан',btn:'Қазақша',prayers:{Fajr:'Таң',Sunrise:'Күншығыс',Dhuhr:'Бесін',Asr:'Екінті',Maghrib:'Ақшам',Isha:'Құптан'}},
en:{timeTo:'Time until',city:'Almaty, Kazakhstan',btn:'English',prayers:{Fajr:'Fajr',Sunrise:'Sunrise',Dhuhr:'Dhuhr',Asr:'Asr',Maghrib:'Maghrib',Isha:'Isha'}}
};
const slides = document.querySelectorAll('.bg-slide');
const dotsContainer = document.getElementById('dots');
slides.forEach((_,i)=>{
const dot=document.createElement('div');dot.className='dot'+(i===currentSlide?' active':'');dot.onclick=()=>goToSlide(i);dotsContainer.appendChild(dot);
});
function updateSlides(){
slides.forEach((s,i)=>s.classList.toggle('active',i===currentSlide));
document.querySelectorAll('.dot').forEach((d,i)=>d.classList.toggle('active',i===currentSlide));
localStorage.setItem('kaabaSlide',currentSlide);
}
function nextSlide(){currentSlide=(currentSlide+1)%slides.length;updateSlides();}
function prevSlide(){currentSlide=(currentSlide-1+slides.length)%slides.length;updateSlides();}
function goToSlide(n){currentSlide=n;updateSlides();}
document.getElementById('nextBtn').onclick=nextSlide;
document.getElementById('prevBtn').onclick=prevSlide;
setInterval(nextSlide,8000);
updateSlides();

document.getElementById('langBtn').onclick=function(){
const langs=['ru','kz','en'];const idx=langs.indexOf(currentLang);
currentLang=langs[(idx+1)%3];localStorage.setItem('lang',currentLang);
this.textContent=i18n[currentLang].btn;
document.getElementById('cityName').textContent=i18n[currentLang].city;
renderPrayerList();updateCountdown();
};
function updateHijri(){try{const d=new Date();const h=new Intl.DateTimeFormat('ar-TN-u-ca-islamic',{day:'numeric',month:'long',year:'numeric'}).format(d);document.getElementById('hijriDate').textContent=h;}catch(e){document.getElementById('hijriDate').textContent='15 Мухаррам 1448';}}
function getNextPrayer(){const now=new Date();const order=['Fajr','Sunrise','Dhuhr','Asr','Maghrib','Isha'];for(let k of order){const [hh,mm]=PRAYER_TIMES[k].split(':');const dd=new Date();dd.setHours(parseInt(hh),parseInt(mm),0,0);if(dd>now)return{key:k,date:dd};}const [h,m]=PRAYER_TIMES.Fajr.split(':');const dd=new Date();dd.setDate(dd.getDate()+1);dd.setHours(parseInt(h),parseInt(m),0,0);return{key:'Fajr',date:dd};}
function renderPrayerList(){const t=i18n[currentLang].prayers;const order=['Fajr','Sunrise','Dhuhr','Asr','Maghrib','Isha'];const active=getNextPrayer().key;document.getElementById('prayerList').innerHTML=order.map(k=>`<div class="prayer-item ${k===active?'active':''}"><div class="prayer-name">${t[k]}</div><div class="prayer-time">${PRAYER_TIMES[k]}</div></div>`).join('');}
function updateCountdown(){const t=i18n[currentLang].prayers;const t2=i18n[currentLang];const next=getNextPrayer();const diff=next.date-new Date();const h=Math.floor(Math.abs(diff)/3600000);const m=Math.floor((Math.abs(diff)%3600000)/60000);const s=Math.floor((Math.abs(diff)%60000)/1000);document.getElementById('prayerLabel').textContent=t2.timeTo+' '+t[next.key];document.getElementById('timer').textContent=`${h<10?'0'+h:h}:${m<10?'0'+m:m}:${s<10?'0'+s:s}`;document.getElementById('nextPrayer').textContent=t[next.key]+' '+PRAYER_TIMES[next.key];}
document.getElementById('langBtn').textContent=i18n[currentLang].btn;
document.getElementById('cityName').textContent=i18n[currentLang].city;
updateHijri();updateCountdown();setInterval(updateCountdown,1000);renderPrayerList();
</script>
</body>
</html>
