      .logo { font-size: 20px; font-weight: 800; cursor: pointer; }
      .controls { display: flex; gap: 6px; flex-wrap: wrap; }
      .btn { background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.25); color: white; padding: 7px 12px; border-radius: 10px; cursor: pointer; font-weight: 600; font-size: 13px; font-family: inherit; }
      .btn.active { background: #10b981; border-color: #10b981; }
      .main { padding: 15px; }
      .container { max-width: 900px; margin: 0 auto; }
      .glass { background: rgba(0,0,0,0.45); padding: 20px 15px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.15); margin-bottom: 15px; }
      .center { text-align: center; }
      .city { font-size: 16px; opacity: 0.9; margin-bottom: 6px; }
      .hijri { font-size: 12px; opacity: 0.6; margin-bottom: 12px; }
      .label { font-size: 14px; opacity: 0.8; margin-bottom: 12px; }
      .time { font-size: 52px; font-weight: 800; margin-bottom: 8px; line-height: 1; }
      .next-prayer { font-size: 13px; opacity: 0.7; margin-bottom: 15px; }
      .prayer-list { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 20px; padding-top: 12px; border-top: 1px solid rgba(255,255,255,0.1); }
      .prayer-item { font-size: 11px; text-align: center; }
      .prayer-name { opacity: 0.6; margin-bottom: 3px; }
      .prayer-time { font-weight: 600; }
      .prayer-item.active { color: #10b981; }
      .quran-btn { background: #10b981; border: none; color: white; padding: 12px 20px; font-size: 15px; font-weight: 600; border-radius: 12px; cursor: pointer; text-decoration: none; display: inline-block; margin: 4px; font-family: inherit; }
      .quran-btn.blue { background: #3b82f6; }
      .title { font-size: 22px; font-weight: 800; margin-bottom: 15px; text-align: center; }
      .surah-grid { display: grid; grid-template-columns: 1fr; gap: 10px; }
      .surah-item { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); padding: 12px; border-radius: 12px; cursor: pointer; display: flex; align-items: center; gap: 12px; }
      .surah-item:hover { background: rgba(16,185,129,0.25); }
      .surah-num { background: #10b981; width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 14px; flex-shrink: 0; }
      .surah-name-ar { font-family: 'Amiri', serif; font-size: 18px; }
      .surah-name-ru { font-size: 13px; opacity: 0.8; }
      .surah-ayahs { font-size: 11px; opacity: 0.5; }
      .surah-header { text-align: center; margin-bottom: 20px; }
      .surah-title-ar { font-family: 'Amiri', serif; font-size: 34px; margin-bottom: 6px; }
      .surah-title-ru { font-size: 16px; opacity: 0.8; }
      .tabs { display: flex; gap: 6px; justify-content: center; margin-bottom: 20px; flex-wrap: wrap; }
      .tab-btn { background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.25); color: white; padding: 8px 14px; border-radius: 10px; cursor: pointer; font-weight: 600; font-size: 13px; font-family: inherit; }
      .tab-btn.active { background: #10b981; }
      .ayah { margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.08); }
      .ayah-num { display: inline-block; background: rgba(16,185,129,0.25); border: 1px solid #10b981; padding: 3px 10px; border-radius: 15px; font-size: 11px; margin-bottom: 10px; }
      .ayah-ar { font-family: 'Amiri', serif; font-size: 24px; line-height: 1.9; text-align: right; direction: rtl; margin-bottom: 10px; }
      .ayah-tr { font-size: 14px; line-height: 1.6; opacity: 0.85; margin-bottom: 8px; font-style: italic; }
      .ayah-ru { font-size: 14px; line-height: 1.6; opacity: 0.85; margin-bottom: 6px; }
      .ayah-kz { font-size: 14px; line-height: 1.6; opacity: 0.9; color: #fcd34d; margin-bottom: 6px; }
      .hidden { display: none!important; }
      .view { display: none; }
      .view.active { display: block; }
    </style>
</head>

                tr: ["Innā a'ṭaynāka l-kawthar","Faṣalli lirabbika wa nḥar","Inna shāni'aka huwa l-abtar"],
                ru: ["Мы даровали тебе аль-Каусар.","Совершай намаз ради своего Господа и закалывай жертву.","Воистину, твой ненавистник сам окажется бездетным."],
                kz: ["Расында Біз саған Кәусарды бердік.","Ендеше Раббың үшін намаз оқы және құрбан шал.","Расында сені жек көрушінің өзі ұрпақсыз қалады."]
            },
            97: {
                ar: ["إِنَّا أَنزَلْنَاهُ فِي لَيْلَةِ الْقَدْرِ","وَمَا أَدْرَاكَ مَا لَيْلَةُ الْقَدْرِ","لَيْلَةُ الْقَدْرِ خَيْرٌ مِّنْ أَلْفِ شَهْرٍ","تَنَزَّلُ الْمَلَائِكَةُ وَالرُّوحُ فِيهَا بِإِذْنِ رَبِّهِم مِّن كُلِّ أَمْرٍ","سَلَامٌ هِيَ حَتَّىٰ مَطْلَعِ الْفَجْرِ"],
                tr: ["Innā anzalnāhu fī laylati l-qadr","Wa mā adrāka mā laylatu l-qadr","Laylatu l-qadri khayrun min alfi shahr","Tanazzalu l-malā'ikatu wa r-rūḥu fīhā bi'idhni rabbihim min kulli amr","Salāmun hiya ḥattā maṭla'i l-fajr"],
                ru: ["Воистину, Мы ниспослали его в ночь предопределения.","Откуда ты мог знать, что такое ночь предопределения?","Ночь предопределения лучше тысячи месяцев.","В эту ночь ангелы и Дух нисходят с дозволения их Господа по всем Его повелениям.","Она благополучна вплоть до наступления зари."],
                kz: ["Расында, Біз оны Қадір түнінде түсірдік.","Қадір түнінің не екенін білесің бе?","Қадір түні мың айдан қайырлы.","Ол түні періштелер мен Рух Раббыларының рұқсатымен әрбір істе түседі.","Ол таң атқанға дейін сәлем, тыныштық."]
            }
        };

        let currentView = 'timer';
        let currentSurah = null;
        let currentTab = 'all';
        let currentLang = localStorage.getItem('lang') || 'ru';

        const i18n = {
            ru: { timeTo: 'Время до', btn: 'Русский', city: 'Алматы, Казахстан', back: '← Назад', all: 'Все', title: '📖 Суры Священного Корана - 114' },
            kz: { timeTo: 'Уақыт қалды:', btn: 'Қазақша', city: 'Алматы, Қазақстан', back: '← Артқа', all: 'Барлығы', title: '📖 Құран сүрелері - 114' },
            en: { timeTo: 'Time until', btn: 'English', city: 'Almaty, Kazakhstan', back: '← Back', all: 'All', title: '📖 Surahs of the Quran - 114' }
        };

        const prayers_i18n = {
            ru: { Fajr: 'Фаджр', Sunrise: 'Восход', Dhuhr: 'Зухр', Asr: 'Аср', Maghrib: 'Магриб', Isha: 'Иша' },
            kz: { Fajr: 'Таң', Sunrise: 'Күншығыс', Dhuhr: 'Бесін', Asr: 'Екінті', Maghrib: 'Ақшам', Isha: 'Құптан' },
            en: { Fajr: 'Fajr', Sunrise: 'Sunrise', Dhuhr: 'Dhuhr', Asr: 'Asr', Maghrib: 'Maghrib', Isha: 'Isha' }
        };

        function showView(view) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById('view' + view.charAt(0).toUpperCase() + view.slice(1)).classList.add('active');
            document.getElementById('tabTimer').classList.toggle('active', view === 'timer');
            document.getElementById('tabSurah').classList.toggle('active', view === 'surahList' || view === 'surah');
            currentView = view;
            window.scrollTo(0, 0);
        }

        document.getElementById('tabTimer').onclick = () => showView('timer');
        document.getElementById('tabSurah').onclick = () => { showView('surahList'); renderSurahList(); };

        document.getElementById('langBtn').onclick = function() {
            const langs = ['ru', 'kz', 'en'];
            const idx = langs.indexOf(currentLang);
            currentLang = langs[(idx + 1) % langs.length];
            localStorage.setItem('lang', currentLang);
            this.textContent = i18n[currentLang].btn;
            document.getElementById('cityName').textContent = i18n[currentLang].city;
            document.getElementById('surahListTitle').textContent = i18n[currentLang].title;
            document.getElementById('backBtn').textContent = i18n[currentLang].back;
            renderPrayerList();
            updateCountdown();
            renderSurahList();
        };

        function updateHijriDate() {
            try {
                const date = new Date();
                const hijri = new Intl.DateTimeFormat('ar-TN-u-ca-islamic', { day: 'numeric', month: 'long', year: 'numeric' }).format(date);
                document.getElementById('hijriDate').textContent = hijri;
            } catch(e) { document.getElementById('hijriDate').textContent = '15 Мухаррам 1448'; }
        }

        function renderPrayerList() {
            const t = prayers_i18n[currentLang];
            const order = ['Fajr', 'Sunrise', 'Dhuhr', 'Asr', 'Maghrib', 'Isha'];
            const activePrayer = getNextPrayer().key;
            document.getElementById('prayerList').innerHTML = order.map(key => `<div class="prayer-item ${key === activePrayer? 'active' : ''}"><div class="prayer-name">${t[key]}</div><div class="prayer-time">${PRAYER_TIMES[key]}</div></div>`).join('');
        }

        function getNextPrayer() {
            const now = new Date();
            const order = ['Fajr', 'Sunrise', 'Dhuhr', 'Asr', 'Maghrib', 'Isha'];
            for (let key of order) {
                const [h, m] = PRAYER_TIMES[key].split(':');
                const d = new Date(); d.setHours(parseInt(h), parseInt(m), 0, 0);
                if (d > now) return { key, date: d };
            }
            const [h, m] = PRAYER_TIMES.Fajr.split(':');
            const d = new Date(); d.setDate(d.getDate()+1); d.setHours(parseInt(h), parseInt(m), 0, 0);
            return { key: 'Fajr', date: d };
        }

        function updateCountdown() {
            const t = prayers_i18n[currentLang];
            const t2 = i18n[currentLang];
            const next = getNextPrayer();
            const diff = next.date - new Date();
            const h = Math.floor(Math.abs(diff) / 3600000);
            const m = Math.floor((Math.abs(diff) % 3600000) / 60000);
            const s = Math.floor((Math.abs(diff) % 60000) / 1000);
            document.getElementById('prayerLabel').textContent = t2.timeTo + ' ' + t[next.key];
            document.getElementById('timer').textContent = `${h<10?'0'+h:h}:${m<10?'0'+m:m}:${s<10?'0'+s:s}`;
            document.getElementById('nextPrayer').textContent = t[next.key] + ' ' + PRAYER_TIMES[next.key];
        }

        function renderSurahList() {
            const lang = currentLang;
            document.getElementById('surahList').innerHTML = SURAHS.map(s => {
                const name = lang === 'kz'? s.name_kz : s.name_ru;
                return `<div class="surah-item" onclick="loadSurah(${s.id})"><div class="surah-num">${s.id}</div><div><div class="surah-name-ar">${s.name_ar}</div><div class="surah-name-ru">${name}</div><div class="surah-ayahs">${s.ayahs} аят</div></div></div>`;
            }).join('');
        }

        function loadSurah(id) {
            showView('surah');
            const surah = SURAHS.find(s => s.id === id);
            document.getElementById('surahTitleAr').textContent = surah.name_ar;
            document.getElementById('surahTitleRu').textContent = currentLang === 'kz'? surah.name_kz : surah.name_ru;
            const data = QURAN_DATA[id];
            if (!data) {
                document.getElementById('ayahContainer').innerHTML = `<div style="text-align:center;padding:40px;opacity:0.7;">Сүре "${surah.name_kz}" әлі жүктелмеді.<br>Қазір 30-шы параның қысқа сүрелері бар.<br><br>Бұл сүре үшін <a href="https://quran.com/${id}" target="_blank" style="color:#10b981">quran.com</a> оқыңыз.</div>`;
                return;
            }
            renderAyahs(data.ar, data.tr, data.ru, data.kz);
        }

        function renderAyahs(ar, tr, ru, kz) {
            document.getElementById('ayahContainer').innerHTML = ar.map((a, i) => `<div class="ayah"><div class="ayah-num">Аят ${i+1}</div><div class="ayah-ar ayah-part">${a}</div><div class="ayah-tr ayah-part">${tr[i]}</div><div class="ayah-ru ayah-part">${ru[i]}</div><div class="ayah-kz ayah-part">🇰🇿 ${kz[i]}</div></div>`).join('');
            switchTab(currentTab);
        }

        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentTab = btn.dataset.tab;
                switchTab(currentTab);
            };
        });

        function switchTab(tab) {
            document.querySelectorAll('.ayah-part').forEach(el => el.classList.add('hidden'));
            if (tab === 'all') document.querySelectorAll('.ayah-part').forEach(el => el.classList.remove('hidden'));
            else if (tab === 'ar') document.querySelectorAll('.ayah-ar').forEach(el => el.classList.remove('hidden'));
            else if (tab === 'tr') document.querySelectorAll('.ayah-tr').forEach(el => el.classList.remove('hidden'));
            else if (tab === 'ru') document.querySelectorAll('.ayah-ru').forEach(el => el.classList.remove('hidden'));
            else if (tab === 'kz') document.querySelectorAll('.ayah-kz').forEach(el => el.classList.remove('hidden'));
        }

        document.getElementById('langBtn').textContent = i18n[currentLang].btn;
        document.getElementById('cityName').textContent = i18n[currentLang].city;
        document.getElementById('surahListTitle').textContent = i18n[currentLang].title;
        updateHijriDate();
        updateCountdown();
        setInterval(updateCountdown, 1000);
        renderPrayerList();
        renderSurahList();
    </script>
</body>
</html>
