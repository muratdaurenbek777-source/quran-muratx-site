<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quran MuratX</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-overlay: rgba(0,0,0,0.55);
            --glass-bg: rgba(0,0,0,0.4);
            --header-bg: rgba(0,0,0,0.4);
            --text-color: white;
            --border-color: rgba(255,255,255,0.25);
            --btn-bg: rgba(255,255,255,0.2);
            --btn-border: rgba(255,255,255,0.4);
        }
        body.light {
            --bg-overlay: rgba(255,255,255,0.3);
            --glass-bg: rgba(255,255,255,0.6);
            --header-bg: rgba(255,255,255,0.6);
            --text-color: #1a1a1a;
            --border-color: rgba(0,0,0,0.15);
            --btn-bg: rgba(0,0,0,0.08);
            --btn-border: rgba(0,0,0,0.2);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Manrope', sans-serif; height: 100vh; color: var(--text-color); overflow: hidden; transition: color 0.3s; }
.bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, #0f172a, #1e293b); z-index: -1; transition: 0.5s ease-in-out; }
body.light.bg { background: linear-gradient(135deg, #e0f2fe, #bae6fd); }
.header { display: flex; justify-content: space-between; align-items: center; padding: 20px 40px; background: var(--header-bg); backdrop-filter: blur(15px); border-bottom: 1px solid var(--border-color); transition: 0.3s; }
.logo { font-size: 24px; font-weight: 800; }
.controls { display: flex; gap: 12px; }
.btn { background: var(--btn-bg); border: 1px solid var(--btn-border); color: var(--text-color); padding: 10px 18px; border-radius: 12px; cursor: pointer; font-weight: 600; backdrop-filter: blur(10px); transition: 0.3s; font-family: inherit; }
.btn:hover { opacity: 0.8; }
.main { text-align: center; padding: 20px; height: calc(100vh - 81px); display: flex; align-items: center; justify-content: center; }
.glass { background: var(--glass-bg); padding: 30px 35px; border-radius: 24px; backdrop-filter: blur(20px); border: 1px solid var(--border-color); box-shadow: 0 8px 32px rgba(0,0,0,0.3); max-width: 550px; width: 100%; transition: 0.3s; }
.city-wrap { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 8px; }
.city { font-size: 18px; font-weight: 300; opacity: 0.9; cursor: pointer; }
.city:hover { text-decoration: underline; }
.label { font-size: 16px; font-weight: 300; opacity: 0.8; margin-bottom: 16px; }
.time { font-size: 72px; font-weight: 800; letter-spacing: 2px; line-height: 1; margin-bottom: 10px; }
.next-prayer { font-size: 14px; opacity: 0.7; margin-bottom: 20px; }
.prayer-list { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; margin-bottom: 25px; padding-top: 15px; border-top: 1px solid var(--border-color); }
.prayer-item { font-size: 11px; }
.prayer-name { opacity: 0.7; margin-bottom: 4px; }
.prayer-time { font-weight: 600; }
.prayer-item.active { color: #10b981; }
.prayer-item.active.prayer-time { font-weight: 800; }
.quran-btn { background: linear-gradient(135deg, #10b981, #059669); border: none; color: white; padding: 16px 40px; font-size: 18px; font-weight: 600; border-radius: 14px; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 20px rgba(16,185,129,0.5); text-decoration: none; display: inline-block; font-family: inherit; }
.quran-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 25px rgba(16,185,129,0.7); }
.loading { font-size: 14px; opacity: 0.7; grid-column: span 6; }
        @media (max-width: 600px) {.time { font-size: 48px; }.glass { padding: 20px 15px; margin: 0 15px; }.header { padding: 15px 20px; }.prayer-list { grid-template-columns: repeat(3, 1fr); gap: 10px; }.prayer-item { font-size: 10px; }.controls { gap: 8px; }.btn { padding: 8px 12px; font-size: 14px; } }
    </style>
</head>
<body>
    <div class="bg" id="bg"></div>
    <header class="header">
        <div class="logo">Quran MuratX</div>
        <div class="controls">
            <button class="btn" id="themeBtn">🌙</button>
            <button class="btn" id="soundBtn">🔔</button>
            <button class="btn" id="bgBtn">🕋</button>
            <button class="btn" id="langBtn">RU</button>
        </div>
    </header>
    <main class="main">
        <div class="glass">
            <div class="city-wrap">
                <div class="city" id="city" title="Нажми чтобы выбрать город">Алматы, Казахстан</div>
                <button class="btn" id="locationBtn" style="padding: 4px 8px; font-size: 14px;">📍</button>
            </div>
            <div class="label" id="prayerLabel">Время до намаза</div>
            <div class="time" id="timer">00:00:00</div>
            <div class="next-prayer" id="nextPrayer">Загрузка...</div>
            <div class="prayer-list" id="prayerList">
                <div class="loading">Загружаем время намаза...</div>
            </div>
            <a href="https://quran.com" target="_blank" class="quran-btn" id="quranBtn">📖 Читать Коран</a>
        </div>
    </main>
    <audio id="azanAudio" preload="auto">
        <source src="https://cdn.islamic.network/adhans/azan1.mp3" type="audio/mpeg">
    </audio>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var backgrounds = ['./bg1.jpg', './bg2.jpg', './bg3.jpg', './bg4.jpg', './bg5.jpg'];
            var currentBg = parseInt(localStorage.getItem('bgIndex')) || 0;
            var soundEnabled = localStorage.getItem('soundEnabled')!== 'false';
            var theme = localStorage.getItem('theme') || 'dark';
            var bgEl = document.getElementById('bg');
            var bgBtn = document.getElementById('bgBtn');
            var langBtn = document.getElementById('langBtn');
            var soundBtn = document.getElementById('soundBtn');
            var themeBtn = document.getElementById('themeBtn');
            var locationBtn = document.getElementById('locationBtn');
            var timerEl = document.getElementById('timer');
            var cityEl = document.getElementById('city');
            var prayerListEl = document.getElementById('prayerList');
            var azanAudio = document.getElementById('azanAudio');
            var lastPlayedPrayer = '';
            var geoTimeout;

            if (theme === 'light') document.body.classList.add('light');
            updateThemeBtn();

            if (!bgEl ||!bgBtn ||!langBtn ||!timerEl) return;

            function trySetBackground(index) {
                var img = new Image();
                img.onload = function() {
                    bgEl.style.backgroundImage = 'linear-gradient(var(--bg-overlay), var(--bg-overlay)), url(' + backgrounds[index] + ')';
                };
                img.onerror = function() {
                    console.log('Картинка не найдена. Градиент.');
                };
                img.src = backgrounds[index];
                updateUI();
            }

            bgBtn.onclick = function() {
                currentBg = (currentBg + 1) % backgrounds.length;
                localStorage.setItem('bgIndex', currentBg);
                trySetBackground(currentBg);
            };

            soundBtn.onclick = function() {
                soundEnabled =!soundEnabled;
                localStorage.setItem('soundEnabled', soundEnabled);
                updateSoundBtn();
            };

            function updateSoundBtn() {
                soundBtn.textContent = soundEnabled? '🔔' : '🔕';
                soundBtn.style.opacity = soundEnabled? '1' : '0.5';
            }
            updateSoundBtn();

            themeBtn.onclick = function() {
                document.body.classList.toggle('light');
                theme = document.body.classList.contains('light')? 'light' : 'dark';
                localStorage.setItem('theme', theme);
                updateThemeBtn();
            };

            function updateThemeBtn() {
                themeBtn.textContent = document.body.classList.contains('light')? '☀️' : '🌙';
            }

            var langs = ['ru', 'kz', 'en'];
            var currentLang = localStorage.getItem('lang') || 'ru';

            var i18n = {
                ru: { city: 'Город', timeTo: 'Время до', bg: 'Фон', quran: '📖 Читать Коран', btn: 'RU', prayers: { Fajr: 'Фаджр', Sunrise: 'Восход', Dhuhr: 'Зухр', Asr: 'Аср', Maghrib: 'Магриб', Isha: 'Иша' }, loading: 'Загружаем время намаза...', location: 'Определяем город...', error: 'Ошибка загрузки' },
                kz: { city: 'Қала', timeTo: 'Уақыт қалды:', bg: 'Фон', quran: '📖 Құран оқу', btn: 'KZ', prayers: { Fajr: 'Таң', Sunrise: 'Күншығыс', Dhuhr: 'Бесін', Asr: 'Екінті', Maghrib: 'Ақшам', Isha: 'Құптан' }, loading: 'Намаз уақытын жүктеу...', location: 'Қаланы анықтау...', error: 'Жүктеу қатесі' },
                en: { city: 'City', timeTo: 'Time until', bg: 'Bg', quran: '📖 Read Quran', btn: 'EN', prayers: { Fajr: 'Fajr', Sunrise: 'Sunrise', Dhuhr: 'Dhuhr', Asr: 'Asr', Maghrib: 'Maghrib', Isha: 'Isha' }, loading: 'Loading prayer times...', location: 'Detecting city...', error: 'Loading error' }
            };

            var prayerTimes = {};
            var currentCity = 'Алматы';

            function updateUI() {
                var t = i18n[currentLang];
                document.getElementById('quranBtn').textContent = t.quran;
                langBtn.textContent = t.btn;
                bgBtn.textContent = '🕋 ' + (currentBg + 1) + '/5';
                updateCountdown();
            }

            langBtn.onclick = function() {
                var idx = langs.indexOf(currentLang);
                currentLang = langs[(idx + 1) % langs.length];
                localStorage.setItem('lang', currentLang);
                renderPrayerList();
                updateUI();
            };

            function renderPrayerList() {
                var t = i18n[currentLang];
                if (!prayerTimes.Fajr) {
                    prayerListEl.innerHTML = '<div class="loading">' + t.loading + '</div>';
                    return;
                }
                var html = '';
                var order = ['Fajr', 'Sunrise', 'Dhuhr', 'Asr', 'Maghrib', 'Isha'];
                var activePrayer = getNextPrayer().key;
                for (var i = 0; i < order.length; i++) {
                    var key = order[i];
                    var activeClass = key === activePrayer? 'active' : '';
                    html += '<div class="prayer-item ' + activeClass + '"><div class="prayer-name">' + t.prayers[key] + '</div><div class="prayer-time">' + prayerTimes[key] + '</div></div>';
                }
                prayerListEl.innerHTML = html;
            }

            function getNextPrayer() {
                var now = new Date();
                var order = ['Fajr', 'Sunrise', 'Dhuhr', 'Asr', 'Maghrib', 'Isha'];
                for (var i = 0; i < order.length; i++) {
                    var key = order[i];
                    if (!prayerTimes[key]) continue;
                    var parts = prayerTimes[key].split(':');
                    var prayerDate = new Date();
                    prayerDate.setHours(parseInt(parts[0]), parseInt(parts[1]), 0, 0);
                    if (prayerDate > now) return { key: key, date: prayerDate };
                }
                var parts = prayerTimes.Fajr.split(':');
                var prayerDate = new Date();
                prayerDate.setDate(prayerDate.getDate() + 1);
                prayerDate.setHours(parseInt(parts[0]), parseInt(parts[1]), 0, 0);
                return { key: 'Fajr', date: prayerDate };
            }

            function playAzan(prayerKey) {
                if (!soundEnabled || prayerKey === 'Sunrise' || lastPlayedPrayer === prayerKey) return;
                lastPlayedPrayer = prayerKey;
                azanAudio.play().catch(function(e) { console.log('Звук заблокирован. Кликни по странице'); });
            }

            function updateCountdown() {
                var t = i18n[currentLang];
                if (!prayerTimes.Fajr) return;

                var next = getNextPrayer();
                var now = new Date();
                var diff = next.date - now;

                if (diff <= 1000 && diff > -1000) playAzan(next.key);

                var h = Math.floor(Math.abs(diff) / 3600000);
                var m = Math.floor((Math.abs(diff) % 3600000) / 60000);
                var s = Math.floor((Math.abs(diff) % 60000) / 1000);

                document.getElementById('prayerLabel').textContent = t.timeTo + ' ' + t.prayers[next.key];
                timerEl.textContent =
                    (h < 10? '0' + h : h) + ':' +
                    (m < 10? '0' + m : m) + ':' +
                    (s < 10? '0' + s : s);
                document.getElementById('nextPrayer').textContent = t.p
