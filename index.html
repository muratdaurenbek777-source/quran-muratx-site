<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quran MuratX</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;600;800&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Manrope', sans-serif;
            min-height: 100vh;
            color: white;
            background: #0f172a;
        }
      .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: rgba(0,0,0,0.6);
            border-bottom: 1px solid rgba(255,255,255,0.15);
        }
      .logo { font-size: 24px; font-weight: 800; cursor: pointer; }
      .controls { display: flex; gap: 8px; }
      .btn {
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            padding: 8px 14px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
        }
      .btn.active { background: #10b981; }
      .main { padding: 20px; }
      .container { max-width: 900px; margin: 0 auto; }
      .glass {
            background: rgba(0,0,0,0.5);
            padding: 30px 25px;
            border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.2);
            margin-bottom: 20px;
        }
      .center { text-align: center; }
      .city { font-size: 18px; opacity: 0.9; margin-bottom: 8px; }
      .hijri { font-size: 14px; opacity: 0.7; margin-bottom: 16px; }
      .label { font-size: 16px; opacity: 0.8; margin-bottom: 16px; }
      .time { font-size: 64px; font-weight: 800; margin-bottom: 10px; }
      .next-prayer { font-size: 14px; opacity: 0.7; margin-bottom: 20px; }
      .prayer-list {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 25px;
            padding-top: 15px;
            border-top: 1px solid rgba(255,255,255,0.15);
        }
      .prayer-item { font-size: 11px; text-align: center; }
      .prayer-name { opacity: 0.7; margin-bottom: 4px; }
      .prayer-time { font-weight: 600; }
      .prayer-item.active { color: #10b981; }
      .quran-btn {
            background: #10b981;
            border: none;
            color: white;
            padding: 16px 40px;
            font-size: 18px;
            font-weight: 600;
            border-radius: 14px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            margin: 6px;
        }
      .quran-btn.blue { background: #3b82f6; }
      .title { font-size: 28px; font-weight: 800; margin-bottom: 20px; text-align: center; }
      .surah-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }
      .surah-item {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 15px;
            border-radius: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 15px;
        }
      .surah-item:hover { background: rgba(16,185,129,0.3); }
      .surah-num {
            background: #10b981;
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            flex-shrink: 0;
        }
      .surah-name-ar { font-family: 'Amiri', serif; font-size: 20px; margin-bottom: 4px; }
      .surah-name-ru { font-size: 14px; opacity: 0.8; }
      .surah-ayahs { font-size: 12px; opacity: 0.6; }
      .surah-header { text-align: center; margin-bottom: 30px; }
      .surah-title-ar { font-family: 'Amiri', serif; font-size: 42px; margin-bottom: 8px; }
      .surah-title-ru { font-size: 20px; opacity: 0.8; }
      .tabs {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }
      .tab-btn {
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            padding: 10px 20px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
        }
      .tab-btn.active { background: #10b981; }
      .ayah {
            margin-bottom: 25px;
            padding-bottom: 25px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
      .ayah-num {
            display: inline-block;
            background: rgba(16,185,129,0.3);
            border: 1px solid #10b981;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            margin-bottom: 12px;
        }
      .ayah-ar {
            font-family: 'Amiri', serif;
            font-size: 28px;
            line-height: 2;
            text-align: right;
            direction: rtl;
            margin-bottom: 12px;
        }
      .ayah-tr {
            font-size: 16px;
            line-height: 1.8;
            opacity: 0.9;
            margin-bottom: 12px;
            font-style: italic;
        }
      .ayah-ru {
            font-size: 16px;
            line-height: 1.8;
            opacity: 0.85;
        }
      .hidden { display: none!important; }
      .view { display: none; }
      .view.active { display: block; }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo" onclick="showView('timer')">Quran MuratX</div>
        <div class="controls">
            <button class="btn active" id="tabTimer">⏰ Таймер</button>
            <button class="btn" id="tabSurah">📖 Суры</button>
            <button class="btn" id="langBtn">Русский</button>
        </div>
    </header>

    <main class="main">
        <div class="container">
            <div class="view active" id="viewTimer">
                <div class="glass center">
                    <div class="city">Алматы, Казахстан</div>
                    <div class="hijri" id="hijriDate">15 Мухаррам 1448</div>
                    <div class="label" id="prayerLabel">Время до намаза</div>
                    <div class="time" id="timer">00:00:00</div>
                    <div class="next-prayer" id="nextPrayer"></div>
                    <div class="prayer-list" id="prayerList"></div>
                    <a href="https://quran.com" target="_blank" class="quran-btn">📖 Читать Коран</a>
                    <button class="quran-btn blue" onclick="showView('surahList')">📚 Все суры</button>
                </div>
            </div>

            <div class="view" id="viewSurahList">
                <div class="glass">
                    <h1 class="title">📖 Суры Священного Корана</h1>
                    <div class="surah-grid" id="surahList"></div>
                </div>
            </div>

            <div class="view" id="viewSurah">
                <div class="glass">
                    <button class="btn" onclick="showView('surahList')" style="margin-bottom: 20px;">← Назад к списку</button>
                    <div class="surah-header">
                        <div class="surah-title-ar" id="surahTitleAr"></div>
                        <div class="surah-title-ru" id="surahTitleRu"></div>
                    </div>
                    <div class="tabs">
                        <button class="tab-btn active" data-tab="all">Все вместе</button>
                        <button class="tab-btn" data-tab="ar">Арабский</button>
                        <button class="tab-btn" data-tab="tr">Транскрипция</button>
                        <button class="tab-btn" data-tab="ru">Русский</button>
                    </div>
                    <div id="ayahContainer"></div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const PRAYER_TIMES = {
            Fajr: '03:45', Sunrise: '05:25', Dhuhr: '13:15',
            Asr: '17:25', Maghrib: '20:50', Isha: '22:30'
        };

        const SURAHS = [
            {id:1,name_ar:"الفَاتِحَة",name_ru:"Аль-Фатиха",ayahs:7},
            {id:112,name_ar:"الإخْلَاص",name_ru:"Аль-Ихлас",ayahs:4},
            {id:113,name_ar:"الفَلَق",name_ru:"Аль-Фаляк",ayahs:5},
            {id:114,name_ar:"النَّاس",name_ru:"Ан-Нас",ayahs:6}
        ];

        const QURAN_DATA = {
            1: {
                ar: ["بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ","الْحَمْدُ لِلَّهِ رَبِّ الْعَالَمِينَ","الرَّحْمَٰنِ الرَّحِيمِ","مَالِكِ يَوْمِ الدِّينِ","إِيَّاكَ نَعْبُدُ وَإِيَّاكَ نَسْتَعِينُ","اهْدِنَا الصِّرَاطَ الْمُسْتَقِيمَ","صِرَاطَ الَّذِينَ أَنْعَمْتَ عَلَيْهِمْ غَيْرِ الْمَغْضُوبِ عَلَيْهِمْ وَلَا الضَّالِّينَ"],
                tr: ["Bismillāhi r-raḥmāni r-raḥīm","Al-ḥamdu lillāhi rabbi l-'ālamīn","Ar-raḥmāni r-raḥīm","Māliki yawmi d-dīn","Iyyāka na'budu wa iyyāka nasta'īn","Ihdinā ṣ-ṣirāṭa l-mustaqīm","Ṣirāṭa lladhīna an'amta 'alayhim ghayri l-maghḍūbi 'alayhim wa la ḍ-ḍāllīn"],
                ru: ["Во имя Аллаха, Милостивого, Милосердного!","Хвала Аллаху, Господу миров,","Милостивому, Милосердному,","Властелину Дня воздаяния!","Тебе одному мы поклоняемся и Тебя одного молим о помощи.","Веди нас прямым путем,","путем тех, кого Ты облагодетельствовал, не тех, на кого пал гнев, и не заблудших."]
            },
            112: {
                ar: ["قُلْ هُوَ اللَّهُ أَحَدٌ","اللَّهُ الصَّمَدُ","لَمْ يَلِدْ وَلَمْ يُولَدْ","وَلَمْ يَكُن لَّهُ كُفُوًا أَحَدٌ"],
                tr: ["Qul huwa llāhu aḥad","Allāhu ṣ-ṣamad","Lam yalid wa lam yūlad","Wa lam yakun lahu kufuwan aḥad"],
                ru: ["Скажи: «Он — Аллах Единый,","Аллах Самодостаточный.","Он не родил и не был рожден,","и нет никого, равного Ему»."]
            },
            113: {
                ar: ["قُلْ أَعُوذُ بِرَبِّ الْفَلَقِ","مِن شَرِّ مَا خَلَقَ","وَمِن شَرِّ غَاسِقٍ إِذَا وَقَبَ","وَمِن شَرِّ النَّفَّاثَاتِ فِي الْعُقَدِ","وَمِن شَرِّ حَاسِدٍ إِذَا حَسَدَ"],
                tr: ["Qul a'ūdhu birabbi l-falaq","Min sharri mā khalaq","Wa min sharri ghāsiqin idhā waqab","Wa min sharri n-naffāthāti fi l-'uqad","Wa min sharri ḥāsidin idhā ḥasad"],
                ru: ["Скажи: «Прибегаю к защите Господа рассвета","от зла того, что Он сотворил,","от зла мрака, когда он наступает,","от зла колдуний, поплевывающих на узлы,","от зла завистника, когда он завидует»."]
            },
            114: {
                ar: ["قُلْ أَعُوذُ بِرَبِّ النَّاسِ","مَلِكِ النَّاسِ","إِلَٰهِ النَّاسِ","مِن شَرِّ الْوَسْوَاسِ الْخَنَّاسِ","الَّذِي يُوَسْوِسُ فِي صُدُورِ النَّاسِ","مِنَ الْجِنَّةِ وَالنَّاسِ"],
                tr: ["Qul a'ūdhu birabbi n-nās","Maliki n-nās","Ilāhi n-nās","Min sharri l-waswāsi l-khannās","Alladhī yuwaswisu fī ṣudūri n-nās","Mina l-jinnati wa n-nās"],
                ru: ["Скажи: «Прибегаю к защите Господа людей,","Царя людей,","Бога людей,","от зла искусителя отступающего,","который наущает в груди людей,","от джиннов и людей»."]
            }
        };

        let currentView = 'timer';
        let currentSurah = null;
        let currentTab = 'all';
        let currentLang = localStorage.getItem('lang') || 'ru';

        const i18n = {
            ru: { timeTo: 'Время до', btn: 'Русский', prayers: { Fajr: 'Фаджр', Sunrise: 'Восход', Dhuhr: 'Зухр', Asr: 'Аср', Maghrib: 'Магриб', Isha: 'Иша' } },
            kz: { timeTo: 'Уақыт қалды:', btn: 'Қазақша', prayers: { Fajr: 'Таң', Sunrise: 'Күншығыс', Dhuhr: 'Бесін', Asr: 'Екінті', Maghrib: 'Ақшам', Isha: 'Құптан' } },
            en: { timeTo: 'Time until', btn: 'English', prayers: { Fajr: 'Fajr', Sunrise: 'Sunrise', Dhuhr: 'Dhuhr', Asr: 'Asr', Maghrib: 'Maghrib', Isha: 'Isha' } }
        };

        function showView(view) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById('view' + view.charAt(0).toUpperCase() + view.slice(1)).classList.add('active');
            document.querySelectorAll('.controls.btn').forEach(b => b.classList.remove('active'));
            if (view === 'timer') document.getElementById('tabTimer').classList.add('active');
            if (view === 'surahList' || view === 'surah') document.getElementById('tabSurah').classList.add('active');
            currentView = view;
            window.scrollTo(0, 0);
        }

        document.getElementById('tabTimer').onclick = () => showView('timer');
        document.getElementById('tabSurah').onclick = () => { showView('surahList'); renderSurahList(); };

        document.getElementById('langBtn').onclick = function() {
            const langs = ['ru', 'kz', 'en'];
            const idx = langs.indexOf(currentLang);
            currentLang = langs[(idx + 1) % langs.length];
            localStorage.setItem('lang', currentLang);
            this.textContent = i18n[currentLang].btn;
            renderPrayerList();
            updateCountdown();
        };

        function renderPrayerList() {
            const t = i18n[currentLang];
            const order = ['Fajr', 'Sunrise', 'Dhuhr', 'Asr', 'Maghrib', 'Isha'];
            const activePrayer = getNextPrayer().key;
            document.getElementById('prayerList').innerHTML = order.map(key => `
                <div class="prayer-item ${key === activePrayer? 'active' : ''}">
                    <div class="prayer-name">${t.prayers[key]}</div>
                    <div class="prayer-time">${PRAYER_TIMES[key]}</div>
                </div>
            `).join('');
        }

        function getNextPrayer() {
            const now = new Date();
            const order = ['Fajr', 'Sunrise', 'Dhuhr', 'Asr', 'Maghrib', 'Isha'];
            for (let key of order) {
                const [h, m] = PRAYER_TIMES[key].split(':');
                const prayerDate = new Date();
                prayerDate.setHours(parseInt(h), parseInt(m), 0, 0);
                if (prayerDate > now) return { key, date: prayerDate };
            }
            const [h, m] = PRAYER_TIMES.Fajr.split(':');
            const prayerDate = new Date();
            prayerDate.setDate(prayerDate.getDate() + 1);
            prayerDate.setHours(parseInt(h), parseInt(m), 0, 0);
            return { key: 'Fajr', date: prayerDate };
        }

        function updateCountdown() {
            const t = i18n[currentLang];
            const next = getNextPrayer();
            const now = new Date();
            const diff = next.date - now;
            const h = Math.floor(Math.abs(diff) / 3600000);
            const m = Math.floor((Math.abs(diff) % 3600000) / 60000);
            const s = Math.floor((Math.abs(diff) % 60000) / 1000);

            document.getElementById('prayerLabel').textContent = t.timeTo + ' ' + t.prayers[next.key];
            document.getElementById('timer').textContent = `${h < 10? '0' + h : h}:${m < 10? '0' + m : m}:${s < 10? '0' + s : s}`;
            document.getElementById('nextPrayer').textContent = t.prayers[next.key] + ' ' + PRAYER_TIMES[next.key];
            renderPrayerList();
        }

        function renderSurahList() {
            document.getElementById('surahList').innerHTML = SURAHS.map(s => `
                <div class="surah-item" onclick="loadSurah(${s.id})">
                    <div class="surah-num">${s.id}</div>
                    <div>
                        <div class="surah-name-ar">${s.name_ar}</div>
                        <div class="surah-name-ru">${s.name_ru}</div>
                        <div class="surah-ayahs">${s.ayahs} аятов</div>
                    </div>
                </div>
            `).join('');
        }

        function loadSurah(id) {
            showView('surah');
            const surah = SURAHS.find(s => s.id === id);
            currentSurah = id;

            document.getElementById('surahTitleAr').textContent = surah.name_ar;
            document.getElementById('surahTitleRu').textContent = surah.name_ru;

            const data = QURAN_DATA[id];
            if (!data) {
                document.getElementById('ayahContainer').innerHTML = `
                    <div style="text-align:center; padding:40px; opacity:0.7;">
                        Сура "${surah.name_ru}" пока не загружена<br>
                        Доступны: Аль-Фатиха, Аль-Ихлас, Аль-Фаляк, Ан-Нас
                    </div>
                `;
                return;
            }

            renderAyahs(data.ar, data.tr, data.ru);
        }

        function renderAyahs(ar, tr, ru) {
            document.getElementById('ayahContainer').innerHTML = ar.map((a, i) => `
                <div class="ayah">
                    <div class="ayah-num">Аят ${i + 1}</div>
                    <div class="ayah-ar ayah-part">${a}</div>
                    <div class="ayah-tr ayah-part">${tr[i]}</div>
                    <div class="ayah-ru ayah-part">${ru[i]}</div>
                </div>
            `).join('');
            switchTab(currentTab);
        }

        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentTab = btn.dataset.tab;
                switchTab(currentTab);
            };
        });

        function switchTab(tab) {
            document.querySelectorAll('.ayah-part').forEach(el => el.classList.add('hidden'));
            if (tab === 'all') {
                document.querySelectorAll('.ayah-part').forEach(el => el.classList.remove('hidden'));
            } else if (tab === 'ar') {
                document.querySelectorAll('.ayah-ar').forEach(el => el.classList.remove('hidden'));
            } else if (tab === 'tr') {
                document.querySelectorAll('.ayah-tr').forEach(el => el.classList.remove('hidden'));
            } else if (tab === 'ru') {
                document.querySelectorAll('.ayah-ru').forEach(el => el.classList.remove('hidden'));
            }
        }

        document.getElementById('langBtn').textContent = i18n[currentLang].btn;
        updateCountdown();
        setInterval(updateCountdown, 1000);
        renderPrayerList();
    </script>
</body>
</html>
