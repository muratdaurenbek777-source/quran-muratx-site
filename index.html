    ru: { timeTo: 'Время до', btn: 'Русский', prayers: { Fajr: 'Фаджр', Sunrise: 'Восход', Dhuhr: 'Зухр', Asr: 'Аср', Maghrib: 'Магриб', Isha: 'Иша' } },

};

// НАВИГАЦИЯ
function showView(view) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById('view' + view.charAt(0).toUpperCase() + view.slice(1)).classList.add('active');
    document.querySelectorAll('.controls.btn').forEach(b => b.classList.remove('active'));
    if (view === 'timer') document.getElementById('tabTimer').classList.add('active');
    if (view === 'surahList' || view === 'surah') document.getElementById('tabSurah').classList.add('active');
    currentView = view;
    window.scrollTo(0, 0);
}

document.getElementById('tabTimer').onclick = () => showView('timer');
document.getElementById('tabSurah').onclick = () => { showView('surahList'); renderSurahList(); };

// ФОН
function setBackground(index) {
    document.getElementById('bg').style.background = backgrounds[index];
}
setBackground(currentBg);
document.getElementById('bgBtn').onclick = function() {
    currentBg = (currentBg + 1) % backgrounds.length;
    localStorage.setItem('bgIndex', currentBg);
    setBackground(currentBg);
    this.textContent = '🕋 ' + (currentBg + 1) + '/5';
};

// ЯЗЫК
document.getElementById('langBtn').onclick = function() {
    const langs = ['ru', 'kz', 'en'];
    const idx = langs.indexOf(currentLang);
    currentLang = langs[(idx + 1) % langs.length];
    localStorage.setItem('lang', currentLang);
    this.textContent = i18n[currentLang].btn;
    renderPrayerList();
    updateCountdown();
};

// ХИДЖРА
function updateHijriDate() {
    try {
        const date = new Date();
        const hijri = new Intl.DateTimeFormat('ar-TN-u-ca-islamic', { day: 'numeric', month: 'long', year: 'numeric' }).format(date);
        document.getElementById('hijriDate').textContent = hijri;
    } catch(e) {
        document.getElementById('hijriDate').textContent = '15 Мухаррам 1448';
    }
}

// ТАЙМЕР
function renderPrayerList() {
    const t = i18n[currentLang];
    const order = ['Fajr', 'Sunrise', 'Dhuhr', 'Asr', 'Maghrib', 'Isha'];
    const activePrayer = getNextPrayer().key;
    document.getElementById('prayerList').innerHTML = order.map(key => `
        <div class="prayer-item ${key === activePrayer? 'active' : ''}">
            <div class="prayer-name">${t.prayers[key]}</div>
            <div class="prayer-time">${PRAYER_TIMES[key]}</div>
        </div>
    `).join('');
}

function getNextPrayer() {
    const now = new Date();
    const order = ['Fajr', 'Sunrise', 'Dhuhr', 'Asr', 'Maghrib', 'Isha'];
    for (let key of order) {
        const [h, m] = PRAYER_TIMES[key].split(':');
        const prayerDate = new Date();
        prayerDate.setHours(parseInt(h), parseInt(m), 0, 0);
        if (prayerDate > now) return { key, date: prayerDate };
    }
    const [h, m] = PRAYER_TIMES.Fajr.split(':');
    const prayerDate = new Date();
    prayerDate.setDate(prayerDate.getDate() + 1);
    prayerDate.setHours(parseInt(h), parseInt(m), 0, 0);
    return { key: 'Fajr', date: prayerDate };
}

function updateCountdown() {
    const t = i18n[currentLang];
    const next = getNextPrayer();
    const now = new Date();
    const diff = next.date - now;
    const h = Math.floor(Math.abs(diff) / 3600000);
    const m = Math.floor((Math.abs(diff) % 3600000) / 60000);
    const s = Math.floor((Math.abs(diff) % 60000) / 1000);

    document.getElementById('prayerLabel').textContent = t.timeTo + ' ' + t.prayers[next.key];
    document.getElementById('timer').textContent = `${h < 10? '0' + h : h}:${m < 10? '0' + m : m}:${s < 10? '0' + s : s}`;
    document.getElementById('nextPrayer').textContent = t.prayers[next.key] + ' ' + PRAYER_TIMES[next.key];
    renderPrayerList();
}

// СУРЫ
async function loadQuranData() {
    try {
        const res = await fetch('./quran.json');
        QURAN_DATA = await res.json();
        console.log('Коран загружен');
    } catch(e) {
        console.error('Ошибка загрузки quran.json');
    }
}

function renderSurahList() {
    document.getElementById('surahList').innerHTML = SURAHS.map(s => `
        <div class="surah-item" onclick="loadSurah(${s.id})">
            <div class="surah-num">${s.id}</div>
            <div class="surah-info">
                <div class="surah-name-ar">${s.name_ar}</div>
                <div class="surah-name-ru">${s.name_ru}</div>
                <div class="surah-ayahs">${s.ayahs} аятов</div>
            </div>
        </div>
    `).join('');
}

function loadSurah(id) {
    showView('surah');
    const surah = SURAHS.find(s => s.id === id);
    currentSurah = id;

    document.getElementById('surahTitleAr').textContent = surah.name_ar;
    document.getElementById('surahTitleRu').textContent = surah.name_ru;

    const data = QURAN_DATA[id];
    if (!data) {
        document.getElementById('ayahContainer').innerHTML = `
            <div style="text-align:center; padding:40px; opacity:0.7;">
                Сура "${surah.name_ru}" пока не загружена в quran.json<br>
                Доступны: Аль-Фатиха, Аль-Ихлас, Аль-Фаляк, Ан-Нас
            </div>
        `;
        return;
    }

    renderAyahs(data.ar, data.tr, data.ru);
}

function renderAyahs(ar, tr, ru) {
    document.getElementById('ayahContainer').innerHTML = ar.map((a, i) => `
        <div class="ayah">
            <div class="ayah-num">Аят ${i + 1}</div>
            <div class="ayah-ar ayah-part">${a}</div>
            <div class="ayah-tr ayah-part">${tr[i]}</div>
            <div class="ayah-ru ayah-part">${ru[i]}</div>
        </div>
    `).join('');
    switchTab(currentTab);
}

// ВКЛАДКИ СУРЫ
document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.onclick = () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentTab = btn.dataset.tab;
        switchTab(currentTab);
    };
});

function switchTab(tab) {
    document.querySelectorAll('.ayah-part').forEach(el => el.classList.add('hidden'));
    if (tab === 'all') {
        document.querySelectorAll('.ayah-part').forEach(el => el.classList.remove('hidden'));
    } else if (tab === 'ar') {
        document.querySelectorAll('.ayah-ar').forEach(el => el.classList.remove('hidden'));
    } else if (tab === 'tr') {
        document.querySelectorAll('.ayah-tr').forEach(el => el.classList.remove('hidden'));
    } else if (tab === 'ru') {
        document.querySelectorAll('.ayah-ru').forEach(el => el.classList.remove('hidden'));
    }
}

// СТАРТ
document.getElementById('langBtn').textContent = i18n[currentLang].btn;
document.getElementById('bgBtn').textContent = '🕋 ' + (currentBg + 1) + '/5';
updateHijriDate();
updateCountdown();
setInterval(updateCountdown, 1000);
renderPrayerList();

</script>
