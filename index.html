<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quran Muratx</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;600;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Manrope', sans-serif;
            height: 100vh;
            color: white;
            overflow: hidden;
        }
       .bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            /* Красивый градиент + SVG Кааба. Работает всегда, без внешних ссылок */
            background: 
                radial-gradient(circle at 50% 30%, rgba(255,215,0,0.15) 0%, transparent 50%),
                linear-gradient(135deg, #0f172a 0%, #1e293b 25%, #334155 50%, #1e293b 75%, #0f172a 100%);
        }
       .bg::after {
            content: '🕋';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 200px;
            opacity: 0.1;
            filter: blur(2px);
        }
       .header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 40px; background: rgba(0,0,0,0.4); backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255,255,255,0.15);
        }
       .logo { font-size: 24px; font-weight: 800; }
       .controls { display: flex; gap: 12px; }
       .btn {
            background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.4);
            color: white; padding: 10px 18px; border-radius: 12px; cursor: pointer;
            font-weight: 600; backdrop-filter: blur(10px); transition: 0.3s;
        }
       .btn:hover { background: rgba(255,255,255,0.3); }
       .main { text-align: center; padding: 20px; height: calc(100vh - 140px); display: flex; align-items: center; justify-content: center; }
       .glass {
            background: rgba(0,0,0,0.4); padding: 40px 60px;
            border-radius: 24px; backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.25); box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }
       .city { font-size: 18px; font-weight: 300; opacity: 0.9; margin-bottom: 8px; }
       .label { font-size: 16px; font-weight: 300; opacity: 0.8; margin-bottom: 16px; }
       .time { font-size: 80px; font-weight: 800; letter-spacing: 2px; line-height: 1; margin-bottom: 10px; }
       .next-prayer { font-size: 14px; opacity: 0.7; margin-bottom: 30px; }
       .quran-btn {
            background: linear-gradient(135deg, #10b981, #059669); border: none; color: white;
            padding: 16px 40px; font-size: 18px; font-weight: 600; border-radius: 14px;
            cursor: pointer; transition: 0.3s; box-shadow: 0 4px 20px rgba(16,185,129,0.5);
            text-decoration: none; display: inline-block;
        }
       .quran-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 25px rgba(16,185,129,0.7); }
        @media (max-width: 600px) {
           .time { font-size: 56px; }.glass { padding: 30px 20px; }.header { padding: 15px 20px; }
        }
    </style>
</head>
<body>
    <div class="bg"></div>
    
    <header class="header">
        <div class="logo">Quran Muratx</div>
        <div class="controls">
            <button class="btn" onclick="alert('Скоро добавим 5 фонов')">🕋 Фон 1/5</button>
            <button class="btn">Русский</button>
        </div>
    </header>

    <main class="main">
        <div class="glass">
            <div class="city">Алматы, Казахстан</div>
            <div class="label" id="prayerLabel">Время до Аср</div>
            <div class="time" id="timer">01:14:55</div>
            <div class="next-prayer" id="nextPrayer">Аср в 15:45</div>
            <a href="https://quran.com" target="_blank" class="quran-btn">📖 Читать Коран</a>
        </div>
    </main>

    <script>
        const prayerTimes = {
            fajr: '05:30',
            dhuhr: '12:30', 
            asr: '15:45',
            maghrib: '18:15',
            isha: '19:45'
        };

        function updateCountdown() {
            const now = new Date();
            const prayers = [
                { name: 'Фаджр', time: prayerTimes.fajr },
                { name: 'Зухр', time: prayerTimes.dhuhr },
                { name: 'Аср', time: prayerTimes.asr },
                { name: 'Магриб', time: prayerTimes.maghrib },
                { name: 'Иша', time: prayerTimes.isha }
            ];
            
            let nextPrayer = null;
            
            for (let prayer of prayers) {
                const [h, m] = prayer.time.split(':');
                const prayerTime = new Date();
                prayerTime.setHours(h, m, 0, 0);
                
                if (prayerTime > now) {
                    nextPrayer = {...prayer, date: prayerTime };
                    break;
                }
            }
            
            if (!nextPrayer) {
                const [h, m] = prayers[0].time.split(':');
                const prayerTime = new Date();
                prayerTime.setDate(prayerTime.getDate() + 1);
                prayerTime.setHours(h, m, 0, 0);
                nextPrayer = {...prayers[0], date: prayerTime };
            }
            
            const diff = nextPrayer.date - now;
            const h = String(Math.floor(diff / 3600000)).padStart(2,'0');
            const m = String(Math.floor((diff % 3600000) / 60000)).padStart(2,'0');
            const s = String(Math.floor((diff % 60000) / 1000)).padStart(2,'0');
            
            document.getElementById('prayerLabel').textContent = `Время до ${nextPrayer.name}`;
            document.getElementById('timer').textContent = `${h}:${m}:${s}`;
            document.getElementById('nextPrayer').textContent = `${nextPrayer.name} в ${nextPrayer.time}`;
        }
        
        setInterval(updateCountdown, 1000);
        updateCountdown();
    </script>
</body>
</html>
