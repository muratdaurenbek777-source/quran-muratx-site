<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quran Muratx</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;600;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Manrope', sans-serif;
            height: 100vh;
            /* 3 запасных фона. Если один не грузится — включится следующий */
            background: 
                linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
                url('https://images.unsplash.com/photo-1591604129939-f1efa4d9f7fa?q=80&w=2670') center/cover no-repeat,
                url('https://images.pexels.com/photos/1624496/pexels-photo-1624496.jpeg?auto=compress&cs=tinysrgb&w=1920') center/cover no-repeat,
                #1a1a1a; /* Серый если вообще ничего не загрузится */
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            overflow: hidden;
        }
        .header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 40px; background: rgba(0,0,0,0.4); backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255,255,255,0.15);
        }
        .logo { font-size: 24px; font-weight: 800; }
        .controls { display: flex; gap: 12px; }
        .btn {
            background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.4);
            color: white; padding: 10px 18px; border-radius: 12px; cursor: pointer;
            font-weight: 600; backdrop-filter: blur(10px); transition: 0.3s;
        }
        .btn:hover { background: rgba(255,255,255,0.3); }
        .main { text-align: center; padding: 20px; }
        .glass {
            display: inline-block; background: rgba(0,0,0,0.4); padding: 40px 60px;
            border-radius: 24px; backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.25); box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }
        .city { font-size: 18px; font-weight: 300; opacity: 0.9; margin-bottom: 8px; }
        .label { font-size: 16px; font-weight: 300; opacity: 0.8; margin-bottom: 16px; }
        .time { font-size: 80px; font-weight: 800; letter-spacing: 2px; line-height: 1; margin-bottom: 30px; }
        .quran-btn {
            background: linear-gradient(135deg, #10b981, #059669); border: none; color: white;
            padding: 16px 40px; font-size: 18px; font-weight: 600; border-radius: 14px;
            cursor: pointer; transition: 0.3s; box-shadow: 0 4px 20px rgba(16,185,129,0.5);
        }
        .quran-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 25px rgba(16,185,129,0.7); }
        .footer { height: 60px; }
        @media (max-width: 600px) {
            .time { font-size: 56px; } .glass { padding: 30px 20px; } .header { padding: 15px 20px; }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo">Quran Muratx</div>
        <div class="controls">
            <button class="btn">🕋 Фон 1/5</button>
            <button class="btn">Русский</button>
        </div>
    </header>
    <main class="main">
        <div class="glass">
            <div class="city">Алматы, Казахстан</div>
            <div class="label">Время до Зухр</div>
            <div class="time" id="timer">22:15:57</div>
            <button class="quran-btn">📖 Читать Коран</button>
        </div>
    </main>
    <footer class="footer"></footer>
    <script>
        function updateTimer() {
            const now = new Date(); const zuhr = new Date();
            zuhr.setHours(12, 30, 0, 0); if (now > zuhr) zuhr.setDate(zuhr.getDate() + 1);
            const diff = zuhr - now;
            const h = String(Math.floor(diff / 3600000)).padStart(2,'0');
            const m = String(Math.floor((diff % 3600000) / 60000)).padStart(2,'0');
            const s = String(Math.floor((diff % 60000) / 1000)).padStart(2,'0');
            document.getElementById('timer').textContent = `${h}:${m}:${s}`;
        }
        setInterval(updateTimer, 1000); updateTimer();
    </script>
</body>
</html>
